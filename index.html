// ── PASTE-TO-LIST IMPORT ──────────────────────────
function parseTextToList(text){
  if(!text) return { items:[], categoryOrder:[], suggestedName:"", suggestedEmoji:"", categoryEmojis:{} }
  const lines = text.split(/\r?\n/)
  const nonEmptyCount = lines.filter(l => l.trim().length).length
  const items = []
  const categoryOrder = []
  const categoryEmojis = {}
  let currentCat = ""
  let suggestedName = ""
  let suggestedEmoji = ""
  let firstSeen = false
  const STATUS_RE = /^(?:✅|☑️|✓|🤔|⚪|⬜|☐|✗|\[[xv ]\])\s+/iu
  const BULLET_RE = /^(?:[•\-\*▸◦▪]|\d+[.)])\s+/
  const EMOJI_TITLE_RE = /^([\p{Extended_Pictographic}\u{200D}️]+)\s+(.+)$/u
  for(const raw of lines){
    let line = raw.trim()
    if(!line) continue
    const headerMatch = line.match(/^(?:#{1,3}|▸|📂)\s+(.+?):?\s*$/u)
    if(headerMatch){
      const title = headerMatch[1].trim()
      if(!firstSeen && !suggestedName){
        const em = title.match(EMOJI_TITLE_RE)
        if(em){ suggestedEmoji = em[1].slice(0,4); suggestedName = em[2].trim() }
        else suggestedName = title
        firstSeen = true
      } else if(title){
        const em = title.match(EMOJI_TITLE_RE)
        if(em){
          currentCat = em[2].trim()
          categoryEmojis[currentCat] = em[1].slice(0,4)
        } else {
          currentCat = title
        }
        if(!categoryOrder.includes(currentCat)) categoryOrder.push(currentCat)
      }
      continue
    }
    if(!firstSeen && !suggestedName && nonEmptyCount > 1 && line.length <= 60){
      const isStatus = STATUS_RE.test(line)
      const isBullet = BULLET_RE.test(line)
      const startsWithEmoji = /^[\p{Extended_Pictographic}]/u.test(line)
      if(startsWithEmoji && !isStatus && !isBullet){
        const em = line.match(EMOJI_TITLE_RE)
        if(em){
          suggestedEmoji = em[1].slice(0,4)
          suggestedName = em[2].trim()
        } else {
          suggestedName = line
        }
        firstSeen = true
        continue
      }
    }
    let status = 0
    const statusMatch = line.match(/^(✅|☑️|✓|🤔|⚪|⬜|☐|✗|\[[xv ]\])\s*(.+)$/iu)
    if(statusMatch){
      const m = statusMatch[1]
      if(/✅|☑️|✓|\[x\]|\[v\]/i.test(m)) status = 1
      else if(/🤔/.test(m)) status = 2
      line = statusMatch[2].trim()
    }
    line = line.replace(/^[•\-\*▸◦▪]\s+/, "").replace(/^\d+[.)]\s+/, "")
    if(!line) continue
    let price = ""
    const priceMatch = line.match(/\s*\(([^()]+)\)\s*$/)
    if(priceMatch){
      const numMatch = priceMatch[1].match(/(\d+(?:[.,]\d+)?)/)
      if(numMatch){
        price = numMatch[1]
        line = line.slice(0, line.length - priceMatch[0].length).trim()
      }
    }
    if(!line) continue
    let qty = "", unit = ""
    const qm = line.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-ZáéíóúçÁÉÍÓÚÇ]{1,5})?\s+(.+)$/)
    if(qm && qm[3].length > 0){
      qty = qm[1]
      unit = qm[2] || ""
      line = qm[3]
    }
    if(!line) continue
    firstSeen = true
    if(currentCat && !categoryOrder.includes(currentCat)) categoryOrder.push(currentCat)
    items.push({ name: line, status, category: currentCat, qty, unit, price })
  }
  return { items, categoryOrder, suggestedName, suggestedEmoji, categoryEmojis }
}

  save(); renderLists()
  showToast(tp().pasteImported(parsed.items.length))

// ── VOICE INPUT ──────────────────────────────────
const SR_API = window.SpeechRecognition || window.webkitSpeechRecognition
let _voice = null
let _voiceBuffer = ""
let _voiceTriedFallback = false
const VOICE_LANG_MAP = { pt:"pt-BR", en:"en-US", es:"es-ES", ja:"ja-JP", he:"he-IL", ko:"ko-KR" }
const VOICE_SPLIT_RE = /[,;]|\b(?: e | y | and | und | et )\b/i

function toggleVoice(){
  if(!VOICE_AVAILABLE){ showToast(tp().voiceUnsupported); return }
  if(_voice){ stopVoice(); return }
  _voiceTriedFallback = false
  startVoiceLang(VOICE_LANG_MAP[currentLang] || "en-US")
}

function startVoiceLang(lang){
  try {
    _voice = new SR_API()
    _voice.lang = lang
    _voice.continuous = true
    _voice.interimResults = false
    _voiceBuffer = ""
    _voice.onresult = e => {
      for(let i = e.resultIndex; i < e.results.length; i++){
        if(e.results[i].isFinal) _voiceBuffer += " " + e.results[i][0].transcript
      }
    }
    _voice.onend = () => finishVoice()
    _voice.onerror = ev => {
      if(ev.error === "aborted" || ev.error === "no-speech"){
        finishVoice(); return
      }
      // network error: try once with en-US fallback
      if(ev.error === "network" && !_voiceTriedFallback && lang !== "en-US"){
        _voiceTriedFallback = true
        try { _voice.abort() } catch(e){}
        _voice = null
        document.getElementById("voiceBtn").classList.remove("recording")
        setTimeout(() => startVoiceLang("en-US"), 200)
        return
      }
      const tt = tp()
      let msg = tt.voiceError
      if(ev.error === "network") msg = (tt.voiceNetworkError || tt.voiceError) + " — " + (tt.voiceNeedsInternet || "needs internet")
      else if(ev.error === "not-allowed" || ev.error === "service-not-allowed") msg = tt.voicePermissionDenied || tt.voiceError
      else msg = tt.voiceError + " (" + ev.error + ")"
      showToast(msg)
      finishVoice()
    }
    _voice.start()
    document.getElementById("voiceBtn").classList.add("recording")
    if(!_voiceTriedFallback) showToast(tp().voiceListening)
  } catch(e){
    showToast(tp().voiceError)
    _voice = null
  }
}
function stopVoice(){
  if(_voice){ try { _voice.stop() } catch(e){} }
}
function finishVoice(){
  document.getElementById("voiceBtn").classList.remove("recording")
  _voice = null
  const text = (_voiceBuffer || "").trim()
  _voiceBuffer = ""
  if(!text) return
  const items = text.split(VOICE_SPLIT_RE).map(s => s.trim()).filter(Boolean)
  if(!items.length) return
  const ta = document.getElementById("newItems")
  const existing = ta.value.replace(/\s+$/, "")
  ta.value = (existing ? existing + "\n" : "") + items.map(s => s.charAt(0).toUpperCase() + s.slice(1)).join("\n")
  ta.focus()
}
const IS_MOBILE = /Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent || "")
const VOICE_AVAILABLE = !!SR_API && (location.protocol !== "file:") && IS_MOBILE
function initVoice(){
  if(!VOICE_AVAILABLE){
    const b = document.getElementById("voiceBtn")
    if(b) b.style.display = "none"
  }

const BARCODE_AVAILABLE = ("BarcodeDetector" in window) && IS_MOBILE && (location.protocol !== "file:")
let _bcStream = null
let _bcRunning = false
let _bcDetector = null

function initBarcode(){
  const b = document.getElementById("barcodeBtn")
  if(!b) return
  b.style.display = BARCODE_AVAILABLE ? "flex" : "none"
}

async function startBarcode(){
  if(!BARCODE_AVAILABLE){ showToast(tp().barcodeUnsupported); return }
  try {
    _bcStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    })
    _bcDetector = new BarcodeDetector({
      formats: ["ean_13", "ean_8", "code_128", "code_39", "qr_code", "upc_a", "upc_e", "code_93", "itf"]
    })
    _uiResolve = null
    _uiOpen(tp().barcodeTitle, `
      <video id="_bcVideo" autoplay playsinline muted style="width:100%;border-radius:12px;background:#000;max-height:340px;object-fit:cover"></video>
      <p style="text-align:center;font-size:13px;color:var(--muted);margin:10px 0 14px;line-height:1.5">${tp().barcodeAimAt}</p>
      <button class="secondary-btn" onclick="stopBarcode()">${tp().cancelLabel}</button>
    `)
    const video = document.getElementById("_bcVideo")
    video.srcObject = _bcStream
    _bcRunning = true
    detectBarcodeLoop(video)
  } catch(e){
    showToast(tp().barcodeCameraError)
    if(_bcStream){ _bcStream.getTracks().forEach(t => t.stop()); _bcStream = null }
  }
}

async function detectBarcodeLoop(video){
  if(!_bcRunning) return
  try {
    if(video.readyState >= 2){
      const codes = await _bcDetector.detect(video)
      if(codes && codes.length > 0){
        const code = codes[0].rawValue
        handleBarcodeResult(code)
        return
      }
    }
  } catch(e){}
  setTimeout(() => detectBarcodeLoop(video), 250)
}

function stopBarcode(){
  _bcRunning = false
  if(_bcStream){
    _bcStream.getTracks().forEach(t => t.stop())
    _bcStream = null
  }
  closeModal("uiModal")
}

let barcodeMap = JSON.parse(localStorage.getItem("barcodeMap") || "{}")
function saveBarcodeMap(){ localStorage.setItem("barcodeMap", JSON.stringify(barcodeMap)); if(typeof triggerSync==="function") triggerSync() }

async function lookupBarcode(code){
  if(barcodeMap[code]) return barcodeMap[code]
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(code)}.json`)
    if(!res.ok) return null
    const data = await res.json()
    if(data && data.status === 1 && data.product){
      const localized = data.product["product_name_" + currentLang] || data.product.product_name || ""
      const brand = (data.product.brands || "").split(",")[0].trim()
      const qty = data.product.quantity || ""
      const parts = []
      if(brand) parts.push(brand)
      if(localized) parts.push(localized)
      if(qty && !parts.join(" ").toLowerCase().includes(qty.toLowerCase())) parts.push(qty)
      const composed = parts.join(" ").trim()
      if(composed){
        barcodeMap[code] = composed
        saveBarcodeMap()
        return composed
      }
    }
  } catch(e){}
  return null
}

function _appendToItemsTextarea(text){
  const ta = document.getElementById("newItems")
  if(!ta) return
  const existing = ta.value.replace(/\s+$/, "")
  ta.value = (existing ? existing + "\n" : "") + text
  ta.focus()
}

async function handleBarcodeResult(code){
  stopBarcode()
  if(navigator.vibrate) navigator.vibrate(80)
  showToast(tp().barcodeLooking)
  const name = await lookupBarcode(code)
  if(name){
    _appendToItemsTextarea(name)
    showToast(tp().barcodeFound + " " + name)
    return
  }
  const ask = await uiPrompt(tp().barcodeAskName + " (" + code + ")", "")
  if(ask === null) return
  const trimmed = ask.trim()
  if(!trimmed){ _appendToItemsTextarea(code); return }
  barcodeMap[code] = trimmed
  saveBarcodeMap()
  _appendToItemsTextarea(trimmed)
  showToast(tp().barcodeSaved)
}

function pixCRC16(str){
  let crc = 0xFFFF
  for(let i = 0; i < str.length; i++){
    crc ^= str.charCodeAt(i) << 8
    for(let j = 0; j < 8; j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1)
      crc &= 0xFFFF
    }
  }
  return crc.toString(16).toUpperCase().padStart(4, "0")
}
function pixTLV(id, value){
  const len = String(value.length).padStart(2, "0")
  return id + len + value
}
function buildPixCode(cfg){
  const merchantAccount = pixTLV("00", "br.gov.bcb.pix") + pixTLV("01", cfg.key)
  let payload =
    pixTLV("00", "01") +
    pixTLV("26", merchantAccount) +
    pixTLV("52", "0000") +
    pixTLV("53", "986") +
    (cfg.amount > 0 ? pixTLV("54", Number(cfg.amount).toFixed(2)) : "") +
    pixTLV("58", "BR") +
    pixTLV("59", cfg.name) +
    pixTLV("60", cfg.city) +
    pixTLV("62", pixTLV("05", "***"))
  payload += "6304"
  return payload + pixCRC16(payload)
}
async function renderPixQR(){
  try { await loadQRLib() } catch(e){ return }
  const code = buildPixCode(PIX_CONFIG)
  const qr = qrcode(0, "M")
  qr.addData(code)
  qr.make()
  const wrap = document.getElementById("pixQrWrap")
  if(!wrap) return
  wrap.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 2, scalable: true })
  const svg = wrap.querySelector("svg")
  if(svg){ svg.style.maxWidth = "200px"; svg.style.height = "auto"; svg.style.display = "block"; svg.style.margin = "0 auto" }
  const txt = document.getElementById("pixCopyText")
  if(txt) txt.textContent = code
}

    ${spending.top.length ? `
    <div class="settings-section"><h3>🔝 ${tt.statTopSpending || "Top spending"}</h3>
      <ul class="top-items">
        ${spending.top.map(s => `<li><span>${_esc(s.display)}</span><span class="count">${fmt(s.total)}</span></li>`).join("")}
      </ul>
    </div>` : ""}
    ${offenders.length ? `
    <div class="settings-section"><h3>💢 ${tt.statOffenders || "Biggest impact"}</h3>
      <ul class="top-items">
        ${offenders.map(o => {
          const arrow = o.delta > 0 ? "📈" : "📉"
          const sign = o.delta > 0 ? "+" : "-"
          const cls = o.delta > 0 ? "up" : "down"
          return `<li><span>${arrow} ${_esc(o.display)} <small style="opacity:.6;margin-left:4px">×${o.count}</small></span><span class="trend ${cls}">${sign}${fmt(Math.abs(o.delta))}</span></li>`
        }).join("")}
      </ul>
    </div>` : ""}
    <div class="settings-section"><h3>${tt.statTopItems}</h3>
      <ul class="top-items">
        ${top.map(([n,c]) => `<li><span>${n}</span><span class="count">×${c}</span></li>`).join("")}
      </ul>
    </div>
    ${ups.length ? `
    <div class="settings-section"><h3>📈 ${tt.priceUp}</h3>
      <ul class="top-items">${ups.map(trendRow).join("")}</ul>
    </div>` : ""}
    ${downs.length ? `
    <div class="settings-section"><h3>📉 ${tt.priceDown}</h3>
      <ul class="top-items">${downs.map(trendRow).join("")}</ul>
    </div>` : ""}
    ${!ups.length && !downs.length && spending.total === 0 ? `
    <p style="font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5">${tt.priceTrendsHint}</p>` : ""}
  `
  document.getElementById("statsModal").classList.remove("hidden")
}

// ── TITLE ICON ANIMATION ──────────────────────────
;(function(){
  const icons     = ['📋','🌭','🛍️','📓','🐱','📱','🐶','⛩️','🌍']
  const durations = [7000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000]
  const el = document.getElementById('titleIcon')
  let idx = 0

  function advance(){
    idx = (idx + 1) % icons.length
    el.textContent = icons[idx]
    el.style.animation = 'none'
    el.offsetWidth // reflow para reiniciar animação
    el.style.animation = ''
    setTimeout(advance, durations[idx])
  }

  setTimeout(advance, durations[0])
})()

// ── SCROLL-TOP PILL ───────────────────────────────
;(function(){
  const pill = document.getElementById("scrollTopPill")
  if(!pill) return
  let raf = 0
  function update(){
    raf = 0
    pill.classList.toggle("visible", window.scrollY > 320)
  }
  window.addEventListener("scroll", () => {
    if(!raf) raf = requestAnimationFrame(update)
  }, { passive:true })
  update()
})()

// ── INIT ──────────────────────────────────────────
refreshProUI()
applyLang()
initVoice()
initBarcode()
;(async () => {
  const handled = await _handleDropboxCallback()
  if(!handled) checkShareTarget()
})()

if("serviceWorker" in navigator){
  let _refreshing = false
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(_refreshing) return
    _refreshing = true
    window.location.reload()
  })
  navigator.serviceWorker.register("service-worker.js")
    .then(reg => {
      function notifyUpdate(worker){
        showToast(tp().newVersion, () => worker.postMessage({ action: "skipWaiting" }), tp().reload, "refresh")
      }
      if(reg.waiting && navigator.serviceWorker.controller) notifyUpdate(reg.waiting)
      reg.addEventListener("updatefound", () => {
        const w = reg.installing
        if(!w) return
        w.addEventListener("statechange", () => {
          if(w.state === "installed" && navigator.serviceWorker.controller) notifyUpdate(w)
        })
      })
    })
    .catch(e => console.warn("SW error:", e))
}
</script>
