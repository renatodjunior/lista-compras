<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyOwnLists</title>
<link rel="manifest" href="manifest.json">
<script>
(function(){
  try {
    var accent = localStorage.getItem("accent") || ""
    var dark = localStorage.getItem("darkMode") === "1"
    var pro = localStorage.getItem("pro") === "1"
    var presets = {
      green:  { p:"#3a9e4a", d:"#4caf50" },
      blue:   { p:"#1e88e5", d:"#42a5f5" },
      purple: { p:"#8e24aa", d:"#ba68c8" },
      orange: { p:"#fb8c00", d:"#ffa726" },
      pink:   { p:"#e91e63", d:"#f06292" },
      teal:   { p:"#00897b", d:"#26a69a" },
    }
    var c = dark ? "#4caf50" : "#3a9e4a"
    if(pro && accent && presets[accent]) c = dark ? presets[accent].d : presets[accent].p
    var m = document.querySelector('meta[name="theme-color"]')
    if(!m){ m = document.createElement("meta"); m.setAttribute("name","theme-color"); document.head.appendChild(m) }
    m.setAttribute("content", c)
    document.documentElement.style.backgroundColor = c
  } catch(e){}
})()
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MyOwnLists">
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --bg:#f0f4f0;
  --card:#ffffff;
  --text:#1a2e1a;
  --muted:#7a957a;
  --primary:#3a9e4a;
  --primary-light:#e8f5e9;
  --btn:#dde5dd;
  --danger:#e53935;
  --warning:#f59e0b;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
.dark{
  --bg:#141f14;
  --card:#1e2e1e;
  --text:#e0ece0;
  --muted:#6a8f6a;
  --primary:#4caf50;
  --primary-light:#1a2e1a;
  --btn:#2a3d2a;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  margin:0;
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .3s,color .3s;
  -webkit-tap-highlight-color:transparent;
}
.list-card, .list-card *, .item, .item *{
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
.container{ max-width:520px; margin:auto; padding:20px 16px 60px; }
.header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.header h2{
  margin:0; font-size:26px; font-weight:800; color:var(--primary);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
}
.header-right{ display:flex; gap:6px; align-items:center; }
.lang-btn{
  display:flex; align-items:center; gap:6px;
  height:38px; padding:0 8px 0 6px; border-radius:10px; border:none;
  background:var(--btn); color:var(--text); cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:700;
  transition:transform .1s;
}
.lang-btn:active{ transform:scale(.95); }
.lang-flag-icon{
  width:22px; height:14px; border-radius:2px; flex-shrink:0;
  box-shadow:0 0 0 1px rgba(0,0,0,.06);
}
.lang-caret{ font-size:10px; opacity:.6; }

.lang-picker-list{ display:flex; flex-direction:column; gap:6px; }
.lang-picker-row{
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:10px; cursor:pointer;
  background:var(--btn); border:none; color:var(--text);
  font-family:inherit; font-size:14px; font-weight:600;
  text-align:left; transition:transform .1s, filter .15s;
}
.lang-picker-row:hover{ filter:brightness(.96); }
.lang-picker-row:active{ transform:scale(.98); }
.lang-picker-row.active{ background:var(--primary-light); color:var(--primary); }
.lang-picker-row .lang-flag-icon{ width:28px; height:18px; }
.lang-picker-row .pname{ flex:1; }
.lang-picker-row .pcode{ font-size:11px; opacity:.6; font-weight:700; letter-spacing:.05em; }
.theme-btn{
  width:38px; height:38px; border-radius:10px; border:none;
  background:var(--btn); cursor:pointer; font-size:18px;
  transition:transform .1s;
}
.theme-btn:active{ transform:scale(.9); }
.help-btn{
  font-weight:800; font-size:20px; line-height:1;
  color:#1e88e5;
}
.dark .help-btn{ color:#64b5f6; }
.help-btn:hover{ filter:brightness(1.1); }
#titleIcon{
  display:inline-block;
  animation:iconPop .25s ease;
}
@keyframes iconPop{
  0%{ opacity:0; transform:scale(.5) rotate(-15deg); }
  60%{ transform:scale(1.2) rotate(5deg); }
  100%{ opacity:1; transform:scale(1) rotate(0deg); }
}
.list-card{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); padding:14px; border-radius:var(--radius);
  margin-bottom:10px; box-shadow:var(--shadow); transition:transform .15s;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
.list-card:active{ transform:scale(.98); }
.list-card-left{
  display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}
.sortable-ghost{ opacity:0 !important; }
.sortable-chosen{ cursor:grabbing; }
.sortable-chosen:active{ transform:none !important; }
.sortable-drag{
  opacity:.95;
  box-shadow:0 12px 28px rgba(0,0,0,0.25);
  cursor:grabbing;
  transition:none !important;
}
.list-emoji{ font-size:26px; }
.list-info{ display:flex; flex-direction:column; }
.list-name{ font-weight:700; font-size:16px; }
.list-count{ font-size:12px; color:var(--muted); margin-top:2px; }
.actions{ display:flex; gap:6px; }
.icon-btn{
  width:34px; height:34px; border-radius:8px; background:var(--btn);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; border:none; transition:transform .1s;
}
.icon-btn:active{ transform:scale(.88); }
.kebab-btn{
  font-size:20px; font-weight:700; line-height:1;
  color:var(--muted); flex-shrink:0;
}
.section-title{
  font-size:12px; font-weight:800; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted); margin:22px 0 10px;
}
.form-row{ display:flex; gap:8px; margin-bottom:10px; }
.form-row input:first-child{ flex:1; }
.form-row input:last-child{ width:76px; }
input, textarea{
  width:100%; padding:11px 13px; border-radius:10px;
  border:2px solid transparent; background:var(--card); color:var(--text);
  font-family:inherit; font-size:15px; outline:none;
  transition:border-color .2s,box-shadow .2s; box-shadow:var(--shadow);
}
input:focus, textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(76,175,80,.15);
}
textarea{ resize:none; min-height:82px; }
.primary-btn{
  padding:12px; border:none; border-radius:10px; background:var(--primary);
  color:white; cursor:pointer; width:100%; font-family:inherit; font-size:15px;
  font-weight:700; box-shadow:0 3px 10px rgba(76,175,80,.35);
  transition:background .2s,transform .1s;
}
.primary-btn:active{ transform:scale(.98); box-shadow:none; }
.primary-btn:hover{ background:#388e3c; }
.top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; }
.back-btn{
  display:flex; align-items:center; gap:8px; height:38px; padding:0 14px 0 12px;
  border:none; border-radius:10px; background:var(--btn); color:var(--text);
  font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
  transition:transform .1s;
}
.back-btn::before{
  content:""; display:inline-block;
  width:8px; height:8px;
  border-left:2.5px solid currentColor;
  border-bottom:2.5px solid currentColor;
  transform:rotate(45deg) translate(1px,-1px);
  flex-shrink:0;
}
[dir=rtl] .back-btn::before{
  transform:rotate(-135deg) translate(-1px,1px);
}
.back-btn:active{ transform:scale(.96); }
.top-actions{ display:flex; gap:6px; }
.copy-btn, .clear-btn{
  width:38px; height:38px; padding:0;
  background:var(--btn); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; font-family:inherit;
  font-size:18px; color:var(--text); transition:transform .1s;
  line-height:1; flex-shrink:0;
}
.copy-btn:active, .clear-btn:active{ transform:scale(.94); }
#clearBtn{ color:var(--danger); }
.list-title-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.list-title-row h2{ margin:0; font-size:22px; font-weight:800; }
.progress-bar-wrap{
  background:var(--btn); border-radius:99px; height:7px; margin-bottom:18px; overflow:hidden;
}
.progress-bar{
  height:100%; background:var(--primary); border-radius:99px; transition:width .4s ease;
}
[dir=rtl] .progress-bar{ margin-left:auto; }
.category-section{ margin-bottom:14px; }
.category-header{
  display:flex; align-items:center; gap:6px; margin-bottom:6px; padding:4px 4px 4px 0;
  border-radius:8px; transition:background .15s;
}
.category-header:hover{ background:var(--primary-light); }
.cat-drag{ cursor:grab; opacity:.4; font-size:14px; flex-shrink:0; user-select:none; padding:0 2px; }
.category-label{
  font-size:11px; font-weight:800; text-transform:uppercase;
  letter-spacing:.1em; color:var(--muted); flex:1;
}
.use-cat-btn{
  width:24px; height:24px; border-radius:6px; background:var(--primary-light);
  font-size:16px; font-weight:800; color:var(--primary); flex-shrink:0;
}
.use-cat-btn:hover{ background:var(--primary); color:white; }
.collapse-btn{
  width:28px; height:28px; border-radius:7px; background:transparent;
  border:none; cursor:pointer; font-size:11px; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, background .15s;
}
.collapse-btn:hover{ background:var(--btn); }
.item{
  display:flex; align-items:center; gap:10px; background:var(--card);
  padding:10px 12px; border-radius:10px; margin-bottom:7px; box-shadow:var(--shadow);
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
  transition:transform .15s;
  container-type:inline-size;
  container-name:item;
}
.item:active{ transform:scale(.985); }
.drag{ cursor:grab; opacity:.4; font-size:14px; flex-shrink:0; user-select:none; }
.toggle{
  width:22px; height:22px; border-radius:50%; border:2.5px solid #aaa;
  cursor:pointer; flex-shrink:0; transition:background .2s,border-color .2s,transform .15s;
  display:flex; align-items:center; justify-content:center; font-size:11px;
}
.toggle:active{ transform:scale(.85); }
.toggle.done{ background:var(--primary); border-color:var(--primary); }
.toggle.done::after{ content:'✓'; color:white; font-weight:800; }
.toggle.maybe{ background:var(--warning); border-color:var(--warning); }
.toggle.maybe::after{ content:'?'; color:white; font-weight:800; }
.maybe-btn{
  width:22px; height:22px; border-radius:50%; border:2.5px solid #aaa;
  background:transparent; cursor:pointer; flex-shrink:0; padding:0;
  font-size:12px; font-weight:800; color:#999; line-height:1;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s,border-color .2s,color .2s,transform .15s;
}
.maybe-btn:active{ transform:scale(.85); }
.maybe-btn.active{ background:var(--warning); border-color:var(--warning); color:white; }
.hist-del-btn{
  background:transparent; border:none; cursor:pointer; padding:2px 6px;
  font-size:16px; color:#c44; opacity:.55; line-height:1;
}
.hist-del-btn:hover{ opacity:1; }
.hist-table td.del-col{ text-align:center; width:24px; padding:6px 2px; }
.orphan-badge{
  background:#ffe0b2; color:#bf6f00; font-size:9px; font-weight:800;
  padding:2px 5px; border-radius:4px; margin-right:6px; vertical-align:middle;
  text-transform:uppercase; letter-spacing:.04em;
}
.dark .orphan-badge{ background:#3a2810; color:#ffb84d; }
.stat-card.spend .v{ font-size:18px; }
.stats-toolbar{
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; margin-bottom:12px; flex-wrap:wrap;
}
.period-select{
  background:var(--btn); border:none; color:var(--text);
  font-size:11px; font-weight:700; padding:6px 10px; border-radius:10px;
  cursor:pointer; font-family:inherit;
}
.period-select:focus{ outline:1.5px solid var(--primary); outline-offset:1px; }
.item-name{ flex:1; font-size:15px; font-weight:600; transition:opacity .2s; }
.item-name.done{ text-decoration:line-through; opacity:.45; }
.item-name.maybe{ color:var(--warning); }
.hidden{ display:none; }
.toast{
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--primary); color:#fff; padding:11px 22px;
  border-radius:99px; font-size:14px; font-weight:700;
  opacity:0; transition:opacity .25s,transform .25s,background .2s;
  pointer-events:none; z-index:1200; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast-undo{
  margin-left:14px; background:#fff; color:var(--primary);
  border:none; padding:5px 12px; border-radius:99px; cursor:pointer;
  font-family:inherit; font-weight:700; font-size:13px; pointer-events:auto;
}
.empty-state{ text-align:center; color:var(--muted); padding:28px 0 10px; font-size:15px; }
.search-row{ position:relative; margin-bottom:10px; }
.search-row input{ padding-left:36px; }
.search-row::before{
  content:"🔎"; position:absolute; left:11px; top:50%;
  transform:translateY(-50%); font-size:14px; opacity:.6; pointer-events:none;
}
[dir=rtl] .search-row input{ padding-left:13px; padding-right:36px; }
[dir=rtl] .search-row::before{ left:auto; right:11px; }
.no-match{ text-align:center; color:var(--muted); padding:14px 0; font-size:14px; }
.list-stats{ display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.stat-pill{
  background:var(--btn); padding:5px 11px; border-radius:99px;
  font-size:12px; font-weight:700; color:var(--text);
}
.stat-pill.primary{ background:var(--primary-light); color:var(--primary); }
.stat-pill.warn{ background:#fff3d6; color:#a76b00; }
.dark .stat-pill.warn{ background:#3a2e0a; color:#f5c452; }
.item-name{ cursor:pointer; user-select:none; }
.item-tags{
  display:inline-flex; align-items:center; gap:6px;
  flex-shrink:0; order:4;
}
.item-tags > .qty-badge{ order:1; }
.item-tags > .unit-badge{ order:2; }
.item-tags > .price-badge{ order:3; }
@container item (max-width: 320px){
  .item-tags{
    flex-direction:column; align-items:flex-end;
    gap:2px;
  }
  .item-tags > .qty-badge,
  .item-tags > .unit-badge,
  .item-tags > .price-badge{ order:initial; }
}
.item-controls{ display:contents; }
.item-controls > .drag{ order:1; }
.item-controls > .toggle{ order:2; }
.item-controls > .maybe-btn{ order:5; }
.item-controls > .kebab-btn{ order:6; }
.item > .item-name{
  order:3; flex:1; min-width:0;
  overflow-wrap:anywhere; word-break:break-word;
}
.qty-badge, .unit-badge{
  display:inline-block; font-size:11px; font-weight:600;
  padding:2px 7px; border-radius:99px;
  vertical-align:middle; letter-spacing:0;
}
.qty-badge{ background:var(--primary-light); color:var(--primary); font-variant-numeric:tabular-nums; }
.unit-badge{ background:var(--primary-light); color:var(--primary); }
.price-badge{
  font-size:12px; font-weight:700; color:var(--muted);
  white-space:nowrap; flex-shrink:0;
  cursor:pointer; padding:3px 8px; border-radius:8px;
  background:transparent; border:1px dashed transparent;
  transition:background .15s, border-color .15s, transform .12s;
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.price-badge:hover{ background:var(--primary-light); border-color:var(--primary-light); }
.price-badge:active{ transform:scale(.94); }
.item-name.done ~ .item-tags{ opacity:.5; }
.stat-pill.money{ background:#e6f5e6; color:#1b6f1b; }
.dark .stat-pill.money{ background:#1a3a1a; color:#7fdc7f; }
.qty-hint{
  display:flex; align-items:center; gap:8px;
  background:#fff8e1; color:#7a5c00;
  padding:9px 14px; border-radius:10px; margin-bottom:12px;
  font-size:12px; font-weight:600; line-height:1.4;
}
.dark .qty-hint{ background:#2a2200; color:#ffd54f; }
.qty-hint .hint-text{ flex:1; }
.qty-hint button{
  background:transparent; border:none; cursor:pointer;
  font-size:14px; color:inherit; opacity:.7;
  padding:2px 6px; line-height:1; border-radius:6px;
}
.qty-hint button:hover{ opacity:1; }

.frequents-title{
  font-size:11px; font-weight:700; color:var(--muted);
  margin:0 0 8px; letter-spacing:.04em;
}
.frequents-cloud{
  display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;
}
.freq-chip{
  background:var(--primary-light); color:var(--primary);
  border:none; padding:6px 12px; border-radius:99px;
  font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; transition:transform .1s, filter .15s;
  display:inline-flex; align-items:center; gap:4px;
}
.freq-chip:hover{ filter:brightness(.96); }
.freq-chip:active{ transform:scale(.94); }
.freq-chip .freq-count{
  font-size:10px; opacity:.6; font-weight:700;
}

.add-row{ display:flex; gap:8px; align-items:stretch; }
.add-extras{ display:flex; gap:8px; margin:8px 0; }
.add-extras .ui-input{ margin-bottom:0; padding:9px 11px; font-size:14px; }
.add-extra-input{ background:var(--card) !important; }
.add-disclaimer{
  background:var(--primary-light); color:var(--primary);
  padding:10px 12px; border-radius:10px; margin:8px 0;
  font-size:12px; line-height:1.4;
}
.add-disclaimer p{ margin:0 0 8px; font-weight:600; }
.add-disclaimer button{ font-size:12px; padding:8px 12px; }
#sectionAddItems{ color:var(--primary); }
.mic-btn{
  width:48px; flex-shrink:0; border:none; border-radius:10px;
  background:var(--btn); color:var(--text); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, background .2s, box-shadow .2s, color .2s;
}
.mic-btn .mic-icon{ display:block; }
.mic-btn:hover{ background:var(--primary-light); }
.mic-btn:active{ transform:scale(.94); }
.mic-btn.recording{
  background:var(--danger); color:white;
  animation:micPulse 1.1s ease-in-out infinite;
}
@keyframes micPulse{
  0%, 100%{ box-shadow:0 0 0 0 rgba(229,57,53,.55); }
  50%{ box-shadow:0 0 0 8px rgba(229,57,53,0); }
}

.field-label{
  display:block; font-size:10px; font-weight:800;
  text-transform:uppercase; letter-spacing:.08em;
  color:var(--primary); margin:0 0 4px 4px;
}
.field-group{ flex:1; }
.field-group .ui-input{ margin-bottom:0; }
.backup-row{ display:flex; gap:8px; margin-top:12px; }
.backup-btn{
  flex:1; padding:10px; border:none; border-radius:10px; background:var(--btn);
  color:var(--text); font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:transform .1s;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
.backup-btn:active{ transform:scale(.97); }
.btn-icon{
  display:inline-flex; align-items:center; justify-content:center;
  line-height:1; flex-shrink:0;
}
.btn-icon svg{ width:1.15em; height:1.15em; display:block; }
#refreshBtn, #pasteListBtn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
#uncheckBtn .btn-icon{ width:100%; height:100%; }
#uncheckBtn .btn-icon svg{ width:62%; height:62%; }
.dark #uncheckBtn .btn-icon{ color:#ccc9d8 !important; }

/* ── HELP MODAL ── */
.help-modal{
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.55); z-index:1000;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.help-modal.hidden{ display:none; }
#uiModal{ z-index:1100; }
.help-box{
  background:var(--card); border-radius:var(--radius);
  padding:24px; max-width:480px; width:100%;
  max-height:82vh; overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.help-box-header{
  display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
}
.help-box-title{ font-size:18px; font-weight:800; color:var(--primary); }
.help-x-btn{
  width:32px; height:32px; border-radius:8px; border:none;
  background:var(--btn); color:var(--text); cursor:pointer;
  font-size:16px; font-weight:700; line-height:1;
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s;
}
.help-x-btn:active{ transform:scale(.88); }
.help-content h3{
  color:var(--primary); font-size:14px; font-weight:800;
  text-transform:uppercase; letter-spacing:.06em; margin:18px 0 8px;
}
.help-content p{ margin:0 0 8px; line-height:1.7; font-size:14px; }
.help-content ul{ padding-left:20px; margin:0 0 8px; line-height:1.9; font-size:14px; }
.help-content .warn-box{
  background:#fff8e1; border-left:4px solid var(--warning);
  border-radius:8px; padding:10px 14px; margin-top:4px; font-size:13px; line-height:1.6;
}
.dark .help-content .warn-box{ background:#2a2200; }
.help-close-btn{
  width:100%; margin-top:20px; padding:12px; border:none; border-radius:10px;
  background:var(--primary); color:white; font-family:inherit;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:background .2s,transform .1s;
}
.help-close-btn:hover{ background:#388e3c; }
.help-close-btn:active{ transform:scale(.98); }

/* ── PRO ── */
.settings-btn{ position:relative; }
.pro-badge{
  position:absolute; top:-4px; right:-4px;
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; font-size:9px; font-weight:800;
  padding:2px 5px; border-radius:99px;
  box-shadow:0 2px 6px rgba(255,140,0,.4);
  pointer-events:none;
}
.pro-tag{
  display:inline-block;
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; font-size:10px; font-weight:800;
  padding:2px 7px; border-radius:99px; margin-left:6px;
  vertical-align:middle; letter-spacing:.04em;
}
.locked-row{ position:relative; opacity:.55; }
.locked-row::after{
  content:"🔒"; position:absolute; right:10px; top:50%;
  transform:translateY(-50%); font-size:14px;
}
.unlock-cta{
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; border:none; padding:14px 18px;
  border-radius:12px; font-family:inherit; font-weight:800;
  font-size:15px; cursor:pointer; width:100%;
  box-shadow:0 4px 14px rgba(255,140,0,.35);
  transition:transform .1s;
}
.unlock-cta:active{ transform:scale(.97); }
.pro-feature-list{ list-style:none; padding:0; margin:0 0 16px; }
.pro-feature-list li{
  padding:10px 12px; background:var(--btn);
  border-radius:10px; margin-bottom:7px;
  font-size:14px; font-weight:600;
  display:flex; align-items:center; gap:8px;
}
.pro-feature-list li.unlocked{ background:var(--primary-light); color:var(--primary); }
.settings-section{ margin:18px 0 10px; }
.settings-section h3{
  color:var(--primary); font-size:13px; font-weight:800;
  text-transform:uppercase; letter-spacing:.06em; margin:0 0 10px;
}
.color-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.color-swatch{
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:transform .1s;
}
.color-swatch:active{ transform:scale(.9); }
.color-swatch.active{ border-color:var(--text); }
.template-row{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); padding:10px 12px; border-radius:10px;
  margin-bottom:7px; box-shadow:var(--shadow);
}
.template-row .tname{ font-weight:700; font-size:14px; }
.template-row .titems{ font-size:12px; color:var(--muted); margin-top:2px; }
.template-actions{ display:flex; gap:5px; }
.stat-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0 14px;
}
.stat-card{
  background:var(--btn); padding:14px; border-radius:12px; text-align:center;
}
.stat-card .v{ font-size:24px; font-weight:800; color:var(--primary); }
.stat-card .k{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:4px; }
.top-items{ list-style:none; padding:0; margin:0; }
.top-items li{
  padding:8px 12px; background:var(--btn); border-radius:8px;
  margin-bottom:5px; font-size:13px; display:flex; justify-content:space-between;
}
.top-items .count{ color:var(--muted); font-weight:700; }
.top-items .trend{ font-weight:800; font-size:13px; }
.top-items .trend.up{ color:#d32f2f; }
.top-items .trend.down{ color:#2e7d32; }
.dark .top-items .trend.up{ color:#ef5350; }
.dark .top-items .trend.down{ color:#66bb6a; }
.inflation-banner{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--btn); padding:12px 16px; border-radius:12px; margin-bottom:14px;
}
.inflation-banner.up{ background:#ffebee; color:#c62828; }
.inflation-banner.down{ background:#e8f5e9; color:#2e7d32; }
.dark .inflation-banner.up{ background:#3a1010; color:#ef5350; }
.dark .inflation-banner.down{ background:#0d2e0d; color:#66bb6a; }
.inflation-banner .ib-label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
.inflation-banner .ib-value{ font-size:22px; font-weight:800; }

.hist-table{
  width:100%; border-collapse:collapse; font-size:13px;
}
.hist-table th, .hist-table td{
  text-align:left; padding:8px 6px; border-bottom:1px solid var(--btn);
}
.hist-table th{
  font-size:10px; font-weight:800; text-transform:uppercase;
  letter-spacing:.05em; color:var(--muted);
}
.hist-table td.trend{ font-weight:700; }
.hist-table td.trend.up{ color:#d32f2f; }
.hist-table td.trend.down{ color:#2e7d32; }
.dark .hist-table td.trend.up{ color:#ef5350; }
.dark .hist-table td.trend.down{ color:#66bb6a; }
.hist-total{
  display:flex; justify-content:space-between; align-items:center;
  margin-top:14px; padding:10px 12px; background:var(--btn);
  border-radius:10px; font-weight:700; font-size:14px;
}
.hist-total .trend{ font-weight:800; font-size:15px; }
.hist-total .trend.up{ color:#d32f2f; }
.hist-total .trend.down{ color:#2e7d32; }
.dark .hist-total .trend.up{ color:#ef5350; }
.dark .hist-total .trend.down{ color:#66bb6a; }

.sample-fab{
  position:fixed; bottom:84px; right:24px;
  width:49px; height:49px; border-radius:50%;
  background:linear-gradient(135deg, #ffb300, #ff7a00);
  color:white; border:none; cursor:pointer;
  font-size:22px; line-height:1;

.sample-fab.empty-pulse{
  animation:fabPulse 2s ease-in-out infinite;
}
@keyframes fabPulse{
  0%, 100%{ box-shadow:0 4px 16px rgba(255,122,0,.4); }
  50%{ box-shadow:0 4px 16px rgba(255,122,0,.4), 0 0 0 12px rgba(255,122,0,.15); }
}
[dir=rtl] .sample-fab{ right:auto; left:24px; }

.add-fab{
  position:fixed; bottom:24px; right:24px;
  width:49px; height:49px; border-radius:50%;
  background:var(--primary); color:white; border:none; cursor:pointer;
  font-size:28px; line-height:1; font-weight:700;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(76,175,80,.4);
  transition:transform .15s, filter .15s;
  z-index:100;
}
.add-fab:hover{ filter:brightness(1.05); transform:scale(1.05); }
.add-fab:active{ transform:scale(.92); }
[dir=rtl] .add-fab{ right:auto; left:20px; }

.scroll-top-pill{
  position:fixed; top:12px; left:50%; transform:translate(-50%, -8px);
  width:36px; height:36px; border-radius:50%;
  background:var(--card); color:var(--muted); border:1px solid var(--btn);
  cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.15);
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden;
  transition:opacity .2s, transform .2s, visibility .2s, color .15s, background .15s;
  z-index:100;
}
.scroll-top-pill.visible{ opacity:.85; visibility:visible; transform:translate(-50%, 0); }
.scroll-top-pill:hover{ opacity:1; color:var(--primary); background:var(--primary-light); border-color:var(--primary-light); }
.scroll-top-pill:active{ transform:translate(-50%, 0) scale(.92); }
.scroll-top-pill svg{ width:18px; height:18px; }

.sample-row{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:12px;
  background:var(--btn); border:none; color:var(--text);
  cursor:pointer; width:100%; margin-bottom:8px;
  text-align:left; font-family:inherit;
  transition:transform .1s, filter .15s;
}
.sample-row:hover{ filter:brightness(.95); }
.sample-row:active{ transform:scale(.98); }
.sample-row .se{ font-size:28px; }
.sample-row .si{ flex:1; }
.sample-row .sn{ font-weight:700; font-size:14px; }
.sample-row .sd{ font-size:11px; color:var(--muted); margin-top:2px; }
.license-input{
  width:100%; padding:12px; border-radius:10px;
  border:2px solid transparent; background:var(--card); color:var(--text);
  font-family:'Courier New',monospace; font-size:14px;
  letter-spacing:.05em; text-transform:uppercase; outline:none;
  transition:border-color .2s; box-shadow:var(--shadow);
}
.license-input:focus{ border-color:var(--primary); }
.secondary-btn{
  padding:11px; border:none; border-radius:10px; background:var(--btn);
  color:var(--text); cursor:pointer; width:100%;
  font-family:inherit; font-size:14px; font-weight:700;
  transition:transform .1s;
}
.secondary-btn:active{ transform:scale(.98); }
.danger-link{
  background:transparent; border:none; color:var(--danger);
  font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; padding:4px 0; margin-top:8px; text-decoration:underline;
}
.list-card.has-template{ border-left:3px solid var(--warning); }
.pix-divider{
  display:flex; align-items:center; gap:8px;
  margin:18px 0 10px; color:var(--muted);
}
.pix-divider::before, .pix-divider::after{
  content:""; flex:1; height:1px; background:var(--btn);
}
.pix-divider span{
  font-size:11px; font-weight:700; letter-spacing:.06em;
}

/* ── PRINT ── */
@media print {
  @page { margin: 12mm; }
  body{
    background:white !important; color:black !important;
    font-family:'Nunito',system-ui,sans-serif;
  }
  body.dark{ background:white !important; color:black !important; }
  .header, .top-row, .list-stats, .search-row, #frequentsWrap,
  .section-title, #newCategory, #newItems, .primary-btn,
  #addItemsBtn, .icon-btn, .drag, .cat-drag, .collapse-btn,
  .use-cat-btn, .cat-rename-btn, .toast, .help-modal,
  .qty-hint, .site-footer, #listsPage, .progress-bar-wrap,
  .backup-row, #pasteListBtn, .pro-badge, body::before{
    display:none !important;
  }
  .container{ max-width:100%; padding:0; margin:0; }
  #itemsPage{ display:block !important; }
  .list-title-row h2{
    font-size:24px; font-weight:800; color:black !important;
    border-bottom:2px solid black; padding-bottom:6px; margin:0 0 14px;
  }
  .category-section{ page-break-inside:avoid; margin-bottom:14px; }
  .category-header{ background:transparent !important; padding:0; margin:14px 0 6px; }
  .category-label{
    font-size:13px !important; font-weight:800 !important;
    color:black !important; text-transform:uppercase;
    border-bottom:1px dashed #888; padding-bottom:3px;
  }
  .item{
    background:transparent !important; box-shadow:none !important;
    padding:5px 0 !important; margin:0 !important; border-radius:0 !important;
    border-bottom:1px dotted #ccc; gap:10px;
    page-break-inside:avoid;
  }
  .toggle{
    width:14px !important; height:14px !important;
    border:1.5px solid black !important; background:transparent !important;
    border-radius:3px !important;
  }
  .toggle.done{ background:black !important; }
  .toggle.done::after{ color:white !important; font-size:10px !important; }
  .toggle.maybe{ background:transparent !important; border-color:black !important; }
  .toggle.maybe::after{ color:black !important; }
  .item-name{
    color:black !important; opacity:1 !important;
    font-size:14px !important; font-weight:600 !important;
  }
  .item-name.done{ text-decoration:line-through; opacity:.6 !important; }
  .qty-badge, .unit-badge{
    background:transparent !important; color:black !important;
    border:1px solid #888; padding:1px 5px !important; font-size:10px !important;
  }
  .price-badge{ color:black !important; font-weight:700 !important; }
  .stat-pill{ display:none !important; }
}

function _stripLeadingEmoji(s){
  s = String(s || "").trim()
  const parts = s.split(/\s+/)
  return parts.length > 1 ? parts.slice(1).join(" ") : s
}
function iconLabel(key, fullText){
  const color = ICON_COLORS[key] || "currentColor"
  const text = _stripLeadingEmoji(fullText)
  return `<span class="btn-icon" style="color:${color}">${ICONS[key]}</span><span class="btn-text">${text}</span>`
}
function iconOnlyBtn(id, key, label){
  const el = document.getElementById(id)
  if(!el) return
  el.innerHTML = `<span class="btn-icon" style="color:${ICON_COLORS[key]}">${ICONS[key]}</span>`
  el.title = label || ""
  el.setAttribute("aria-label", label || "")

let _toastTimer = null
function setIconBtn(id, fullText){
  const el = document.getElementById(id)
  if(!el) return
  const m = String(fullText || "").match(/^(\S+)/)
  el.textContent = m ? m[1] : ""
  el.title = fullText || ""
  el.setAttribute("aria-label", fullText || "")
}

function showToast(msg, actionFn, actionLabel, iconKey){
  const el = document.getElementById("toast")
  el.innerHTML = ""
  if(iconKey && ICONS[iconKey]){
    const icon = document.createElement("span")
    icon.className = "btn-icon"
    icon.style.marginRight = "8px"
    icon.style.color = "#fff"
    icon.innerHTML = ICONS[iconKey]
    el.appendChild(icon)
  }
  const span = document.createElement("span")
  const cleaned = iconKey ? String(msg || "").replace(/[⬆⬇☁🔄]️?/gu, "").trim() : msg
  span.textContent = cleaned
  el.appendChild(span)
  if(actionFn){
    const btn = document.createElement("button")
    btn.className = "toast-undo"
    btn.textContent = actionLabel || t.undo
    btn.onclick = () => {
      el.classList.remove("show")
      actionFn()
    }
    el.appendChild(btn)
  }
  el.classList.add("show")
  if(_toastTimer) clearTimeout(_toastTimer)
  _toastTimer = setTimeout(() => el.classList.remove("show"), actionFn ? (actionLabel ? 30000 : 4500) : 2200)
}

function createList(){
  const name = document.getElementById("listName").value.trim()
  const emoji = document.getElementById("listEmoji").value.trim() || "🛒"
  if(!name) return
  lists.push({ name, emoji, items:[], categoryOrder:[], collapsedCats:[] })
  document.getElementById("listName").value = ""
  document.getElementById("listEmoji").value = ""
  save(); renderLists()
  showToast(t.listCreated)
}

function renderLists(){
  const container = document.getElementById("lists")
  container.innerHTML = ""
  if(!lists.length){
    container.innerHTML = `<div class="empty-state">${t.emptyLists}</div>`
    refreshSampleFab()
    return
  }
  lists.forEach((list, i) => {
    const total = list.items.length
    const done = list.items.filter(it => it.status === 1).length
    const countText = total ? t.itemsBought(done, total) : t.emptyList
    const div = document.createElement("div")
    div.className = "list-card"
    div.dataset.index = i
    div.innerHTML = `
      <div class="list-card-left" onclick="openList(${i})">
        <span class="list-emoji">${list.emoji}</span>
        <div class="list-info">
          <span class="list-name">${_esc(list.name)}</span>
          <span class="list-count">${countText}</span>
        </div>
      </div>
      <div class="actions">
        <button class="icon-btn kebab-btn" onclick="openListActions(${i})" aria-label="actions">⋮</button>
      </div>
    `
    container.appendChild(div)
  })
  if(window._listsSortable){ try { window._listsSortable.destroy() } catch(e){} }
  if(!container.dataset.ctxBound){
    container.addEventListener("contextmenu", e => {
      if(e.target.closest(".list-card")) e.preventDefault()
    })
    container.dataset.ctxBound = "1"
  }
  window._listsSortable = new Sortable(container, {
    animation: 150,
    delay: 300,
    delayOnTouchOnly: true,
    touchStartThreshold: 5,
    forceFallback: true,
    fallbackTolerance: 4,
    fallbackOnBody: true,
    ghostClass: "sortable-ghost",
    chosenClass: "sortable-chosen",
    dragClass: "sortable-drag",
    filter: ".kebab-btn, .icon-btn",
    preventOnFilter: false,
    onEnd: () => {
      const newOrder = []
      container.querySelectorAll(".list-card").forEach(c => {
        newOrder.push(lists[parseInt(c.dataset.index)])
      })
      lists = newOrder
      save(); renderLists()
    }
  })
  refreshSampleFab()
}

async function openListActions(i){
  const list = lists[i]
  if(!list) return
  const tt = tp()
  const opts = [
    { label: tt.listActionEdit, desc: tt.listActionEditDesc },
    { label: tt.listActionAnalytics, desc: tt.listActionAnalyticsDesc },
    { label: tt.listActionTemplate, desc: tt.listActionTemplateDesc },
    { label: tt.listActionCopy, desc: tt.listActionCopyDesc },
    { label: tt.listActionDelete, desc: tt.listActionDeleteDesc },
  ]
  const choice = await uiChoice(list.emoji + " " + list.name, opts)
  if(choice === null) return
  if(choice === 0) return renameList(i)
  if(choice === 1) return openListAnalytics(i)
  if(choice === 2){ currentList = i; return saveAsTemplate() }
  if(choice === 3){ currentList = i; return copyList() }
  if(choice === 4) return deleteList(i)
}

function openListAnalytics(i){
  const list = lists[i]
  if(!list) return
  const tt = tp()
  const items = list.items || []
  const withPrice = items.filter(it => isFinite(parsePrice(it.price)))
  if(!withPrice.length){
    _uiResolve = null
    _uiOpen(tt.analyticsTitle, `<p style="font-size:14px;color:var(--muted);margin:0;line-height:1.5">${tt.analyticsNoPrices}</p>`)
    return
  }
  const lineValue = it => {
    const p = parsePrice(it.price); if(!isFinite(p)) return 0
    const q = parseFloat(String(it.qty || "").replace(",", "."))
    return p * (isFinite(q) && q > 0 ? q : 1)
  }
  let spent = 0, pending = 0, total = 0
  withPrice.forEach(it => {
    const v = lineValue(it); total += v
    if(it.status === 1) spent += v; else pending += v
  })
  const top = [...withPrice].map(it => ({ it, v: lineValue(it) }))
    .sort((a,b) => b.v - a.v).slice(0, 5)
  const fmt = n => formatPrice(n.toFixed(2))
  const row = (lbl, val, accent) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--btn);border-radius:10px;margin-bottom:8px">
      <span style="font-size:13px;color:var(--muted)">${lbl}</span>
      <span style="font-weight:800;font-size:15px;${accent ? "color:var(--primary)" : ""}">${val}</span>
    </div>`
  const topHTML = top.map(({it, v}) => {
    const qtyTxt = it.qty ? `×${_esc(it.qty)}${it.unit ? " " + _esc(it.unit) : ""}` : ""
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--btn);gap:8px">
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${_esc(it.name)} <span style="font-size:11px;color:var(--muted)">${qtyTxt}</span></span>
      <span style="font-weight:700;font-size:14px;white-space:nowrap">${fmt(v)}</span>
    </div>`
  }).join("")
  _uiResolve = null
  _uiOpen(tt.analyticsTitle, `
    <div style="font-size:12px;color:var(--muted);margin:0 0 12px">${list.emoji} ${_esc(list.name)} · ${tt.analyticsItemsWithPrice(withPrice.length)}</div>
    ${row(tt.analyticsTotalSpent, fmt(spent), true)}
    ${row(tt.analyticsEstimated, fmt(pending))}
    ${row(tt.analyticsTotalAll, fmt(total))}
    <div style="font-size:13px;font-weight:700;margin:16px 0 6px">${tt.analyticsTop}</div>
    <div style="background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--btn)">${topHTML}</div>
  `)
}

function addItems(){
  const txt = document.getElementById("newItems").value.trim()
  const category = document.getElementById("newCategory").value.trim()
  if(!txt) return
  const list = lists[currentList]
  if(!list.categoryOrder) list.categoryOrder = []
  if(!list.collapsedCats) list.collapsedCats = []
  const lines = txt.split("\n").map(s => s.trim()).filter(Boolean)
  const isSingle = lines.length === 1
  let extra = { qty:"", unit:"", price:"" }
  if(isSingle){
    extra = {
      qty: (document.getElementById("addQty")?.value || "").trim(),
      unit: (document.getElementById("addUnit")?.value || "").trim(),
      price: (document.getElementById("addPrice")?.value || "").trim(),
    }
  }
  lines.forEach(name => {
    list.items.push({ name, status:0, category: category || "", qty: extra.qty, unit: extra.unit, price: extra.price })
  })
  if(!list.categoryOrder.includes(category||"")) list.categoryOrder.push(category||"")
  document.getElementById("newItems").value = ""
  ;["addQty","addUnit","addPrice"].forEach(id => { const el = document.getElementById(id); if(el) el.value = "" })
  updateAddExtras()
  save(); renderItems()
  showToast(t.itemsAdded)
}

function updateAddExtras(){
  const ta = document.getElementById("newItems")
  const wrap = document.getElementById("addExtras")
  const disc = document.getElementById("addDisclaimer")
  if(!ta || !wrap || !disc) return
  const lines = ta.value.split("\n").map(s => s.trim()).filter(Boolean)
  const multi = lines.length >= 2
  wrap.style.display = multi ? "none" : "flex"
  disc.style.display = multi ? "block" : "none"
  document.getElementById("addDisclaimerText").textContent = tp().multiItemHint
  document.getElementById("addDisclaimerBtn").textContent = tp().pasteListBtn
}

function toggleStatus(i){
  const item = lists[currentList].items[i]
  const prev = item.status
  item.status = (prev === 1) ? 0 : 1
  if(prev !== 1 && item.status === 1) recordPriceEntry(item)
  save(); renderItems()
}

function toggleMaybe(i){
  const item = lists[currentList].items[i]
  item.status = (item.status === 2) ? 0 : 2
  save(); renderItems()
}

let priceHistory = JSON.parse(localStorage.getItem("priceHistory") || "{}")
function savePriceHistory(){ localStorage.setItem("priceHistory", JSON.stringify(priceHistory)); if(typeof triggerSync==="function") triggerSync() }
function recordPriceEntry(item){
  const name = (item.name || "").trim().toLowerCase()
  if(!name) return
  const price = parsePrice(item.price)
  if(!isFinite(price) || price <= 0) return
  if(!priceHistory[name]) priceHistory[name] = []
  priceHistory[name].push({
    ts: Date.now(),
    qty: item.qty || "",
    unit: item.unit || "",
    price: item.price
  })
  if(priceHistory[name].length > 50) priceHistory[name] = priceHistory[name].slice(-50)
  savePriceHistory()
}

const DROPBOX_APP_KEY = "9nhco8nbzdtlfge"

function _b64url(arr){ return btoa(String.fromCharCode(...arr)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"") }
function _genVerifier(){
  const a = new Uint8Array(32)
  crypto.getRandomValues(a)
  return _b64url(a)
}
async function _sha256b64url(s){
  const buf = new TextEncoder().encode(s)
  const h = await crypto.subtle.digest("SHA-256", buf)
  return _b64url(new Uint8Array(h))
}

async function dropboxConnect(){
  if(DROPBOX_APP_KEY === "REPLACE_WITH_YOUR_APP_KEY"){
    showToast(tp().syncNotConfigured)
    return
  }
  const verifier = _genVerifier()
  sessionStorage.setItem("dbx_verifier", verifier)
  const challenge = await _sha256b64url(verifier)
  const state = _genVerifier()
  sessionStorage.setItem("dbx_state", state)
  const params = new URLSearchParams({
    client_id: DROPBOX_APP_KEY,
    response_type: "code",
    code_challenge: challenge,
    code_challenge_method: "S256",
    redirect_uri: location.origin + "/",
    state,
    token_access_type: "offline",
  })
  location.href = "https://www.dropbox.com/oauth2/authorize?" + params.toString()
}

async function _handleDropboxCallback(){
  const params = new URLSearchParams(location.search)
  const code = params.get("code")
  const state = params.get("state")
  if(!code) return false
  const expected = sessionStorage.getItem("dbx_state")
  if(state !== expected) return false
  const verifier = sessionStorage.getItem("dbx_verifier")
  sessionStorage.removeItem("dbx_state")
  sessionStorage.removeItem("dbx_verifier")
  history.replaceState(null, "", location.pathname)
  try {
    const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        code, grant_type: "authorization_code",
        client_id: DROPBOX_APP_KEY,
        code_verifier: verifier,
        redirect_uri: location.origin + "/",
      })
    })
    const data = await res.json()
    if(!data.access_token) throw new Error("no token")
    localStorage.setItem("dbx_token", JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Date.now() + (data.expires_in || 14400) * 1000,
    }))
    showToast(tp().syncConnected)
    await dropboxPull(true)
  } catch(e){
    showToast(tp().syncAuthError)
  }
  return true
}

async function _dropboxAccessToken(){
  const raw = localStorage.getItem("dbx_token")
  if(!raw) return null
  const t = JSON.parse(raw)
  if(Date.now() < t.expires_at - 60000) return t.access_token
  if(!t.refresh_token) return null
  try {
    const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: t.refresh_token,
        client_id: DROPBOX_APP_KEY,
      })
    })
    const data = await res.json()
    if(!data.access_token) return null
    t.access_token = data.access_token
    t.expires_at = Date.now() + (data.expires_in || 14400) * 1000
    localStorage.setItem("dbx_token", JSON.stringify(t))
    return t.access_token
  } catch(e){ return null }
}

function isDropboxConnected(){ return !!localStorage.getItem("dbx_token") }

function dropboxDisconnect(){
  localStorage.removeItem("dbx_token")
  localStorage.removeItem("dbx_lastSync")
  localStorage.removeItem("dbx_remoteRev")
  localStorage.removeItem("dbx_dirty")
  showToast(tp().syncDisconnected)
  refreshProUI()
}

function _setDbxDirty(v){
  if(v) localStorage.setItem("dbx_dirty", "1")
  else localStorage.removeItem("dbx_dirty")
}
function _isDbxDirty(){ return localStorage.getItem("dbx_dirty") === "1" }

async function dropboxGetMetadata(){
  const token = await _dropboxAccessToken()
  if(!token) return null
  try {
    const res = await fetch("https://api.dropboxapi.com/2/files/get_metadata", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ path: "/data.json" })
    })
    if(res.status === 409) return { notFound: true }
    if(!res.ok) return null
    return await res.json()
  } catch(e){ return null }
}

async function dropboxUpload(silent){
  const token = await _dropboxAccessToken()
  if(!token) return false
  const payload = JSON.stringify({
    lists, templates, priceHistory, barcodeMap,
    syncedAt: Date.now(),
    schemaVersion: 2,
  })
  try {
    const res = await fetch("https://content.dropboxapi.com/2/files/upload", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/octet-stream",
        "Dropbox-API-Arg": JSON.stringify({
          path: "/data.json", mode: "overwrite",
          autorename: false, mute: true,
        })
      },
      body: payload
    })
    if(!res.ok) throw new Error("upload " + res.status)
    const meta = await res.json().catch(() => null)
    if(meta && meta.rev) localStorage.setItem("dbx_remoteRev", meta.rev)
    localStorage.setItem("dbx_lastSync", String(Date.now()))
    _setDbxDirty(false)
    if(!silent) showToast(tp().syncUploaded, null, null, "cloudUp")
    return true
  } catch(e){
    if(!silent) showToast(tp().syncError)
    return false
  }
}

async function dropboxDownload(){
  const token = await _dropboxAccessToken()
  if(!token) return null
  try {
    const res = await fetch("https://content.dropboxapi.com/2/files/download", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Dropbox-API-Arg": JSON.stringify({ path: "/data.json" })
      }
    })
    if(res.status === 409) return null
    if(!res.ok) return null
    const headerStr = res.headers.get("Dropbox-Api-Result") || res.headers.get("dropbox-api-result")
    let rev = null
    if(headerStr){ try { rev = JSON.parse(headerStr).rev } catch(e){} }
    const data = await res.json()
    return { data, rev }
  } catch(e){ return null }
}

function _applyRemote(remote, rev){
  if(Array.isArray(remote.lists)){ lists = remote.lists; localStorage.setItem("lists", JSON.stringify(lists)) }
  if(Array.isArray(remote.templates)){ templates = remote.templates; localStorage.setItem("templates", JSON.stringify(templates)) }
  if(remote.priceHistory && typeof remote.priceHistory === "object"){ priceHistory = remote.priceHistory; localStorage.setItem("priceHistory", JSON.stringify(priceHistory)) }
  if(remote.barcodeMap && typeof remote.barcodeMap === "object"){ barcodeMap = remote.barcodeMap; localStorage.setItem("barcodeMap", JSON.stringify(barcodeMap)) }
  if(rev) localStorage.setItem("dbx_remoteRev", rev)
  localStorage.setItem("dbx_lastSync", String(Date.now()))
  _setDbxDirty(false)
  renderLists()
}

async function _resolveRev(fallback){
  if(fallback) return fallback
  const meta = await dropboxGetMetadata()
  return (meta && !meta.notFound && meta.rev) ? meta.rev : null
}

async function dropboxPull(initial){
  const dl = await dropboxDownload()
  if(!dl){
    if(initial && lists.length > 0){
      await dropboxUpload(true)
      showToast(tp().syncFirstUpload, null, null, "cloudUp")
    } else if(!initial){
      showToast(tp().syncNoRemote)
    }
    return
  }
  if(initial && lists.length > 0){
    const ok = await uiConfirm(tp().syncOverwriteConfirm)
    if(!ok){
      await dropboxUpload(true)
      return
    }
  }
  const rev = await _resolveRev(dl.rev)
  _applyRemote(dl.data, rev)
  showToast(tp().syncDownloaded, null, null, "cloudDown")
}

async function dropboxPush(force){
  if(!isDropboxConnected()) return
  const tt = tp()
  if(!force){
    const meta = await dropboxGetMetadata()
    if(meta === null){ showToast(tt.syncError); return }
    if(!meta.notFound){
      const lastRev = localStorage.getItem("dbx_remoteRev")
      if(meta.rev !== lastRev){
        const choice = await uiChoice(tt.syncConflictRemote, [
          { label: tt.syncOptPullFirst, desc: "" },
          { label: tt.syncOptForce, desc: "" },
          { label: tt.syncOptCancel, desc: "" }
        ])
        if(choice === null || choice === 2) return
        if(choice === 0){ return dropboxPullExplicit(true) }
      }
    }
  }
  showToast(tt.syncRunning)
  const ok = await dropboxUpload(true)
  if(ok) showToast(tt.syncPushed, null, null, "cloudUp")
  refreshProUI()
}

async function dropboxPullExplicit(skipConfirm){
  if(!isDropboxConnected()) return
  const tt = tp()
  if(!skipConfirm && _isDbxDirty()){
    const choice = await uiChoice(tt.syncConflictLocal, [
      { label: tt.syncOptPushFirst, desc: "" },
      { label: tt.syncOptDiscardLocal, desc: "" },
      { label: tt.syncOptCancel, desc: "" }
    ])
    if(choice === null || choice === 2) return
    if(choice === 0){ return dropboxPush(true) }
  }
  showToast(tt.syncRunning)
  const dl = await dropboxDownload()
  if(!dl){ showToast(tt.syncNoRemote); refreshProUI(); return }
  const rev = await _resolveRev(dl.rev)
  _applyRemote(dl.data, rev)
  showToast(tt.syncPulled, null, null, "cloudDown")
  refreshProUI()
}

let _syncDebounce = null
function triggerSync(){
  if(!isDropboxConnected()) return
  _setDbxDirty(true)
  if(_syncDebounce) clearTimeout(_syncDebounce)
  _syncDebounce = setTimeout(async () => {
    const meta = await dropboxGetMetadata()
    if(!meta) return
    const lastRev = localStorage.getItem("dbx_remoteRev")
    if(!meta.notFound && meta.rev !== lastRev) return
    await dropboxUpload(true)
  }, 3000)
}


function openItemHistory(name){

  const nameArg = JSON.stringify(name)
  let prevPrice = null
  const rows = entries.map((e, idx) => {
    const d = new Date(e.ts).toLocaleDateString(locale, { day:"2-digit", month:"2-digit", year:"2-digit" })
    const qtyText = e.qty ? (e.qty + (e.unit ? " " + e.unit : "")) : "—"
    const priceN = parsePrice(e.price)

  }).join("")

  if(isFinite(first) && first > 0 && isFinite(last)){

function _periodStart(period){
  const now = Date.now()
  if(period === "30d") return now - 30 * 86400000
  if(period === "90d") return now - 90 * 86400000
  if(period === "12m") return now - 365 * 86400000
  return 0
}

function _itemInflationPct(entries){
  if(!entries || entries.length < 2) return null
  const sorted = entries.slice().sort((a,b) => a.ts - b.ts)
  const mid = Math.floor(sorted.length / 2)
  const oldHalf = sorted.slice(0, mid)
  const newHalf = sorted.slice(mid)
  const oldPrices = oldHalf.map(e => parsePrice(e.price)).filter(n => isFinite(n) && n > 0)
  const newPrices = newHalf.map(e => parsePrice(e.price)).filter(n => isFinite(n) && n > 0)
  if(!oldPrices.length || !newPrices.length) return null
  const avg = arr => arr.reduce((s, x) => s + x, 0) / arr.length
  const o = avg(oldPrices)
  const n = avg(newPrices)
  if(o <= 0) return null
  return ((n - o) / o) * 100
}

function _itemSpend(entries){
  let sum = 0
  entries.forEach(e => {
    const p = parsePrice(e.price)
    if(!isFinite(p) || p <= 0) return
    const q = parseFloat(String(e.qty || "1").replace(",", ".")) || 1
    sum += p * q
  })
  return sum
}

function computePriceTrends(period){
  const start = _periodStart(period || "all")
  const out = []
  Object.entries(priceHistory).forEach(([name, entries]) => {
    const filtered = entries.filter(e => e.ts >= start)
    const pct = _itemInflationPct(filtered)
    if(pct === null) return
    out.push({
      name,
      display: name.charAt(0).toUpperCase() + name.slice(1),
      pct,
      count: filtered.length
    })
  })
  return out
}

function computeWeightedInflation(period){
  const start = _periodStart(period || "all")
  let weightedSum = 0
  let totalWeight = 0
  let eligible = 0
  Object.entries(priceHistory).forEach(([name, entries]) => {
    const filtered = entries.filter(e => e.ts >= start)
    const pct = _itemInflationPct(filtered)
    if(pct === null) return
    const w = _itemSpend(filtered)
    if(w <= 0) return
    weightedSum += pct * w
    totalWeight += w
    eligible++
  })
  return { pct: totalWeight > 0 ? weightedSum / totalWeight : null, eligible }
}

function computeSpendingStats(period){
  const start = _periodStart(period || "all")
  let total = 0
  let thisMonth = 0
  const perItem = {}
  const now = new Date()
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime()
  Object.entries(priceHistory).forEach(([name, entries]) => {
    entries.forEach(e => {
      if(e.ts < start) return
      const p = parsePrice(e.price)
      if(!isFinite(p) || p <= 0) return
      const q = parseFloat(String(e.qty || "1").replace(",", ".")) || 1
      const amount = p * q
      total += amount
      if(e.ts >= monthStart) thisMonth += amount
      perItem[name] = (perItem[name] || 0) + amount
    })
  })
  const top = Object.entries(perItem)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 5)
    .map(([n, v]) => ({ name: n, display: n.charAt(0).toUpperCase() + n.slice(1), total: v }))
  return { total, thisMonth, top }
}

function computeOffenders(period){
  const start = _periodStart(period || "all")
  const out = []
  Object.entries(priceHistory).forEach(([name, entries]) => {
    const filtered = entries.filter(e => e.ts >= start)
    if(filtered.length < 2) return
    const sorted = filtered.slice().sort((a,b) => a.ts - b.ts)
    const oldest = parsePrice(sorted[0].price)
    const newest = parsePrice(sorted[sorted.length - 1].price)
    if(!isFinite(oldest) || !isFinite(newest) || oldest <= 0) return
    const delta = newest - oldest
    if(delta === 0) return
    out.push({
      name, display: name.charAt(0).toUpperCase() + name.slice(1),
      delta, count: filtered.length,
      impact: Math.abs(delta) * filtered.length,
    })
  })
  return out.sort((a,b) => b.impact - a.impact).slice(0, 5)
}

function computeInflationByList(period){
  const start = _periodStart(period || "all")
  return lists.map(L => {
    const names = (L.items || []).map(it => (it.name || "").trim().toLowerCase()).filter(Boolean)
    let weightedSum = 0
    let totalWeight = 0
    let eligible = 0
    names.forEach(n => {
      const e = priceHistory[n]
      if(!e) return
      const filtered = e.filter(x => x.ts >= start)
      const pct = _itemInflationPct(filtered)
      if(pct === null) return
      const w = _itemSpend(filtered)
      if(w <= 0) return
      weightedSum += pct * w
      totalWeight += w
      eligible++
    })
    return {
      name: L.name, emoji: L.emoji || "",
      count: eligible,
      pct: totalWeight > 0 ? weightedSum / totalWeight : null
    }
  }).filter(x => x.pct !== null).sort((a,b) => b.pct - a.pct)
}

function setStatsPeriod(p){
  localStorage.setItem("stats_period", p)
  openStats()
}

function openManagePrices(){
  if(!pro){ openUnlock(); return }
  const tt = tp()
  const names = Object.keys(priceHistory).filter(n => priceHistory[n] && priceHistory[n].length > 0)
  if(!names.length){
    _uiOpen(tt.managePricesTitle || "Manage prices", `<p style="font-size:13px;color:var(--muted);text-align:center;padding:20px">${tt.managePricesEmpty || "No price history yet."}</p><div style="text-align:center;margin-top:14px"><button class="secondary-btn" style="width:auto;padding:8px 18px" onclick="closeModal('uiModal')">${tt.okLabel}</button></div>`)
    return
  }
  const living = new Set()
  lists.forEach(L => (L.items || []).forEach(it => {
    const k = (it.name || "").trim().toLowerCase()
    if(k) living.add(k)
  }))
  const locale = { pt:"pt-BR", en:"en-US", es:"es-ES", ja:"ja-JP", he:"he-IL", ko:"ko-KR" }[currentLang] || "en-US"
  const items = names.map(n => {
    const entries = priceHistory[n]
    const last = new Date(entries[entries.length - 1].ts).toLocaleDateString(locale, { day:"2-digit", month:"2-digit", year:"2-digit" })
    return { name: n, display: n.charAt(0).toUpperCase() + n.slice(1), count: entries.length, last, orphan: !living.has(n) }
  }).sort((a,b) => {
    if(a.orphan !== b.orphan) return a.orphan ? -1 : 1
    return a.display.localeCompare(b.display)
  })
  const orphanCount = items.filter(it => it.orphan).length
  const rows = items.map(it => {
    const badge = it.orphan ? `<span class="orphan-badge">${tt.managePricesOrphan || "Orphan"}</span>` : ""
    return `<tr><td>${badge}${_esc(it.display)}</td><td>${it.count}</td><td>${it.last}</td><td class="del-col"><button class="hist-del-btn" onclick='deleteAllPriceEntries(${JSON.stringify(it.name)})' aria-label="delete">🗑</button></td></tr>`
  }).join("")
  const cleanBtn = orphanCount > 0
    ? `<div style="text-align:center;margin-bottom:12px"><button class="secondary-btn" style="width:auto;padding:8px 16px;font-size:12px" onclick="cleanOrphanHistories()">🧹 ${tt.managePricesCleanOrphans || "Clean orphans"} (${orphanCount})</button></div>`
    : ""
  _uiOpen(tt.managePricesTitle || "Manage prices", `
    ${cleanBtn}
    <table class="hist-table">
      <thead><tr><th>Item</th><th>#</th><th>${tt.dateCol || "Date"}</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="text-align:center;margin-top:14px">
      <button class="secondary-btn" style="width:auto;padding:8px 18px" onclick="closeModal('uiModal')">${tt.okLabel}</button>
    </div>
  `)
}

function deleteAllPriceEntries(name){
  if(!priceHistory[name]) return
  delete priceHistory[name]
  savePriceHistory()
  showToast(tp().historyCleared || "History cleared")
  openManagePrices()
}

function cleanOrphanHistories(){
  const living = new Set()
  lists.forEach(L => (L.items || []).forEach(it => {
    const k = (it.name || "").trim().toLowerCase()
    if(k) living.add(k)
  }))
  let removed = 0
  Object.keys(priceHistory).forEach(n => {
    if(!living.has(n)){ delete priceHistory[n]; removed++ }
  })
  if(removed > 0){
    savePriceHistory()
    showToast(tp().historyCleared || "History cleared")
    openManagePrices()
  } else {
    showToast(tp().managePricesNoOrphans || "No orphans")
  }
}

async function openItemActions(i){
  const item = lists[currentList].items[i]
  if(!item) return
  const tt = tp()
  const histKey = (item.name || "").trim().toLowerCase()
  const hasHist = pro && histKey && priceHistory[histKey] && priceHistory[histKey].length > 0
  const opts = [{ label: tt.actionEdit, desc: tt.actionEditDesc }]
  opts.push({ label: tt.actionCopy, desc: tt.actionCopyDesc })
  if(hasHist) opts.push({ label: tt.actionHistory, desc: tt.actionHistoryDesc })
  opts.push({ label: tt.actionDelete, desc: tt.actionDeleteDesc })
  const choice = await uiChoice(item.name, opts)
  if(choice === null) return
  if(choice === 0) return editItem(i)
  if(choice === 1) return copyItem(i)
  if(hasHist && choice === 2) return openItemHistory(histKey)
  return deleteItem(i)
}

function copyItem(i){
  const item = lists[currentList].items[i]
  if(!item) return
  const parts = [item.name]
  if(item.qty) parts.push(`×${item.qty}${item.unit ? " " + item.unit : ""}`)
  else if(item.unit) parts.push(item.unit)
  const price = formatPrice(item.price)
  if(price) parts.push(price)
  const text = parts.join(" ")
  const done = () => showToast(t.copied)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text))
  } else { fallbackCopy(text) }
}

async function editItem(i){
  const item = lists[currentList].items[i]
  const result = await uiItemEdit(item)
  if(!result || !result.name) return
  item.name = result.name
  item.qty = result.qty || ""
  item.unit = result.unit || ""
  item.price = result.price || ""
  save(); renderItems()
}

function editItemPrice(i){
  const item = lists[currentList].items[i]
  if(!item) return
  const tt = tp()
  _uiResolve = null
  _uiOpen(tt.priceLabel, `
    <label class="field-label">${_esc(item.name)}</label>
    <input id="_uiPriceQuick" class="ui-input" inputmode="decimal" placeholder="${tt.pricePh}" value="${_esc(item.price)}">
    <div class="ui-row">
      <button class="secondary-btn" onclick="uiCancel()">${tt.cancelLabel}</button>
      <button class="primary-btn" onclick="_savePriceQuick(${i})">${tt.okLabel}</button>
    </div>`)
  setTimeout(() => {
    const p = document.getElementById("_uiPriceQuick")
    if(p){
      p.focus(); p.select()

function _savePriceQuick(i){
  const p = document.getElementById("_uiPriceQuick")
  const val = p ? p.value.trim() : ""
  const item = lists[currentList].items[i]
  if(item){
    item.price = val
    save(); renderItems()
  }
  closeModal("uiModal")
}

async function deleteItem(i){
  const li = currentList
  const removed = lists[li].items[i]
  const histKey = (removed.name || "").trim().toLowerCase()
  const hasHist = histKey && priceHistory[histKey] && priceHistory[histKey].length > 0
  let removedHist = null
  if(hasHist){
    const yes = await uiConfirm(tp().confirmDeleteHistory || "Also delete its price history?")
    if(yes){
      removedHist = priceHistory[histKey]
      delete priceHistory[histKey]
      savePriceHistory()
    }
  }
  lists[li].items.splice(i, 1)
  save(); renderItems()
  showToast(t.itemDeleted, () => {
    lists[li].items.splice(i, 0, removed)
    if(removedHist){
      priceHistory[histKey] = removedHist
      savePriceHistory()
    }
    save(); renderItems()
    showToast(t.restored)
  })
}

function toggleCollapse(cat){

// ── RENDER ITEMS ──────────────────────────────────

function renderItems(){
  const container = document.getElementById("items")
  container.innerHTML = ""
  const list = lists[currentList]
  if(!list.categoryOrder) list.categoryOrder = []
  if(!list.collapsedCats) list.collapsedCats = []

  const total = list.items.length
  const done = list.items.filter(it => it.status === 1).length
  const maybeC = list.items.filter(it => it.status === 2).length
  const pending = total - done - maybeC
  const pct = total ? Math.round((done/total)*100) : 0
  document.getElementById("progressBar").style.width = pct + "%"

  const stats = document.getElementById("listStats")
  if(stats){
    stats.innerHTML = ""
    if(total){
      if(pending > 0) stats.innerHTML += `<span class="stat-pill primary">⏳ ${t.remaining(pending)}</span>`
      if(done > 0) stats.innerHTML += `<span class="stat-pill">✅ ${t.done(done)}</span>`
      if(maybeC > 0) stats.innerHTML += `<span class="stat-pill warn">🤔 ${t.maybe(maybeC)}</span>`
      if(total && pending === 0 && maybeC === 0) stats.innerHTML = `<span class="stat-pill primary">${t.allDone}</span>`
      const totalPrice = list.items.reduce((s, it) => { const p = parsePrice(it.price); return s + (isFinite(p) ? p : 0) }, 0)
      if(totalPrice > 0) stats.innerHTML += `<span class="stat-pill money">💰 ${tp().listTotal(formatPrice(totalPrice))}</span>`
    }
  }

  const itemDL = document.getElementById("itemNameOptions")
  if(itemDL){
    itemDL.innerHTML = ""
    const all = new Set()
    lists.forEach(L => L.items.forEach(it => { if(it.name) all.add(it.name) }))
    Array.from(all).sort().forEach(n => { const o = document.createElement("option"); o.value = n; itemDL.appendChild(o) })
  }

  if(!total){
    container.innerHTML = `<div class="empty-state">${t.emptyItems}</div>`
    renderFrequents()
    return
  }

  const hasMeta = list.items.some(it => it.qty || it.unit || it.price)
  const hintDismissed = localStorage.getItem("hint_qty_dismissed") === "1"
  if(!hasMeta && !hintDismissed){
    const hint = document.createElement("div")
    hint.className = "qty-hint"
    hint.innerHTML = `<span class="hint-text">${tp().qtyHint}</span><button onclick="dismissQtyHint()" aria-label="dismiss">✕</button>`
    container.appendChild(hint)
  }

  const dl = document.getElementById("categoryOptions")
  if(dl){
    dl.innerHTML = ""
    const cats = [...new Set(list.items.map(it => it.category).filter(Boolean))]
    cats.forEach(c => { const o = document.createElement("option"); o.value = c; dl.appendChild(o) })
  }

  const q = (document.getElementById("searchInput")?.value || "").trim().toLowerCase()

  const groups = {}
  let visibleCount = 0
  list.items.forEach((item, i) => {
    if(q && !item.name.toLowerCase().includes(q)) return
    const cat = item.category || ""
    if(!groups[cat]) groups[cat] = []
    groups[cat].push({ item, i })
    visibleCount++
  })
  if(q && !visibleCount){
    container.innerHTML = `<div class="no-match">${t.noMatch}</div>`
    return
  }

  const existingCats = Object.keys(groups)
  const orderedCats = list.categoryOrder.filter(c => existingCats.includes(c))
  existingCats.forEach(c => { if(!orderedCats.includes(c)) orderedCats.push(c) })
  list.categoryOrder = orderedCats

  const catContainer = document.createElement("div")
  catContainer.id = "catContainer"
  container.appendChild(catContainer)

  orderedCats.forEach(cat => {
    const isCollapsed = list.collapsedCats.includes(cat)
    const section = document.createElement("div")
    section.className = "category-section"
    section.dataset.cat = cat

    if(cat){
      const header = document.createElement("div")
      header.className = "category-header"
      const catEsc = cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")
      const catEmoji = (list.categoryEmojis && list.categoryEmojis[cat]) || "🏷️"
      header.innerHTML = `
        <div class="cat-drag">⠿</div>
        <div class="category-label">${catEmoji} ${cat}</div>
        <button class="cat-rename-btn" title="✏️" onclick="renameCategory('${catEsc}')">✏️</button>
        <button class="icon-btn use-cat-btn" title="+" onclick="useCategory('${catEsc}')">+</button>
        <button class="collapse-btn" onclick="toggleCollapse('${catEsc}')">
          ${isCollapsed ? '▶' : '▼'}
        </button>
      `
      section.appendChild(header)
    }

    const wrap = document.createElement("div")
    wrap.dataset.cat = cat
    if(isCollapsed) wrap.classList.add("hidden")

    groups[cat].forEach(({ item, i }) => {
      const row = document.createElement("div")
      row.className = "item"
      row.dataset.index = i
      const tc = item.status===1?"done":item.status===2?"maybe":""
      const togCls = item.status===1?"done":""
      const maybeActive = item.status===2?"active":""
      const qtyBadge = item.qty ? `<span class="qty-badge">×${_esc(item.qty)}</span>` : ""
      const unitBadge = item.unit ? `<span class="unit-badge">${_esc(item.unit)}</span>` : ""
      const priceText = formatPrice(item.price)
      const priceBadge = priceText ? `<span class="price-badge" onclick="event.stopPropagation();editItemPrice(${i})" role="button" tabindex="0" aria-label="${tp().priceLabel}">${priceText}</span>` : ""
      const tagsHTML = (qtyBadge || unitBadge || priceBadge)
        ? `<div class="item-tags">${qtyBadge}${priceBadge}${unitBadge}</div>`
        : ""
      row.innerHTML = `
        <div class="item-name ${tc}" onclick="toggleStatus(${i})">${item.name}</div>
        <div class="item-controls">
          <div class="drag">⠿</div>
          <div class="toggle ${togCls}" onclick="toggleStatus(${i})"></div>
          <button class="maybe-btn ${maybeActive}" onclick="toggleMaybe(${i})" aria-label="maybe">?</button>
          <button class="icon-btn kebab-btn" onclick="openItemActions(${i})" aria-label="actions">⋮</button>
        </div>
        ${tagsHTML}
      `
      wrap.appendChild(row)
    })

    section.appendChild(wrap)
    catContainer.appendChild(section)

    if(!wrap.dataset.ctxBound){
      wrap.addEventListener("contextmenu", e => {
        if(e.target.closest(".item")) e.preventDefault()
      })
      wrap.dataset.ctxBound = "1"
    }
    new Sortable(wrap, {
      animation:150,
      delay:300,
      delayOnTouchOnly:true,
      touchStartThreshold:5,
      forceFallback:true,
      fallbackTolerance:4,
      fallbackOnBody:true,
      ghostClass:"sortable-ghost",
      chosenClass:"sortable-chosen",
      dragClass:"sortable-drag",
      filter:".toggle, .maybe-btn, .kebab-btn, .icon-btn, .price-badge",
      preventOnFilter:false,
      onEnd:() => {
        const allItems = []
        document.querySelectorAll("[data-cat] .item").forEach(row => {
          allItems.push(lists[currentList].items[parseInt(row.dataset.index)])
        })
        lists[currentList].items = allItems
        save(); renderItems()
      }
    })
  })

  new Sortable(catContainer, {
    handle:".cat-drag", animation:150,
    onEnd:() => {
      const newOrder = []
      catContainer.querySelectorAll(".category-section").forEach(sec => {
        newOrder.push(sec.dataset.cat)
      })
      lists[currentList].categoryOrder = newOrder
      save(); renderItems()
    }
  })

  renderFrequents()
}

// ── COPY LIST ─────────────────────────────────────

function buildListText(list, withStatus, resetStatus, includeTotal){
  const statusLabel = ["⚪","✅","🤔"]
  const groups = {}
  list.items.forEach(item => {
    const cat = item.category || ""
    if(!groups[cat]) groups[cat] = []
    groups[cat].push(item)
  })
  const orderedCats = (list.categoryOrder || []).filter(c => groups[c])
  Object.keys(groups).forEach(c => { if(!orderedCats.includes(c)) orderedCats.push(c) })
  const lines = [list.emoji + " " + list.name, ""]
  orderedCats.forEach(cat => {
    if(cat){
      const ce = (list.categoryEmojis && list.categoryEmojis[cat]) || ""
      lines.push("▸ " + (ce ? ce + " " : "") + cat)
    }
    groups[cat].forEach(item => {
      const eff = resetStatus ? 0 : item.status
      const prefix = withStatus ? statusLabel[eff] : "•"
      const qty = item.qty ? `${item.qty}${item.unit ? " " + item.unit : ""} ` : ""
      const price = formatPrice(item.price)
      const priceTail = price ? `  (${price})` : ""
      lines.push(`${prefix} ${qty}${item.name}${priceTail}`)
    })
    if(cat) lines.push("")
  })
  if(includeTotal){
    const totalPrice = list.items.reduce((s, it) => { const p = parsePrice(it.price); return s + (isFinite(p) ? p : 0) }, 0)
    if(totalPrice > 0){
      lines.push("")
      lines.push(tp().listTotal(formatPrice(totalPrice)))
    }
  }
  return lines.join("\n")
}

async function copyList(){
  const list = lists[currentList]
  if(!list || !list.items.length){ showToast(t.listEmpty); return }
  const opts = [
    { label: tp().copyOnlyItems, desc: tp().copyOnlyItemsDesc },
    { label: tp().copyWithStatus, desc: tp().copyWithStatusDesc },
    { label: tp().copyShare, desc: tp().copyShareDesc },
    { label: tp().printOption, desc: tp().printOptionDesc },
    { label: tp().qrOption + (pro ? "" : " 🔒"), desc: tp().qrOptionDesc },
  ]
  const choice = await uiChoice(tp().copyTitle, opts)
  if(choice === null) return
  if(choice === 3){ window.print(); return }
  if(choice === 4){ generateQR(); return }
  const withStatus = choice === 1 || choice === 2
  const resetStatus = choice === 2
  const text = buildListText(list, withStatus, resetStatus, true)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(t.copied)).catch(()=>fallbackCopy(text))
  } else { fallbackCopy(text) }
}

function loadQRLib(){
  if(window.qrcode) return Promise.resolve()
  return new Promise((resolve, reject) => {
    const s = document.createElement("script")
    s.src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"
    s.onload = resolve
    s.onerror = reject
    document.head.appendChild(s)
  })
}

async function generateQR(){
  const list = lists[currentList]
  if(!list || !list.items.length){ showToast(t.listEmpty); return }
  if(!pro){ openUnlock(); return }
  try {
    await loadQRLib()
  } catch(e){
    showToast(tp().qrLibError)
    return
  }
  const text = buildListText(list, true, true, false)
  const baseUrl = "https://myownlists.app/?import="
  const url = baseUrl + encodeURIComponent(text)
  let qr
  try {
    qr = qrcode(0, "L")
    qr.addData(url)
    qr.make()
  } catch(e){
    showToast(tp().qrTooLarge)
    return
  }
  const svg = qr.createSvgTag({ cellSize: 6, margin: 4, scalable: true })
  _uiResolve = null
  _uiOpen(tp().qrTitle, `
    <div style="background:white;border-radius:12px;padding:16px;display:flex;justify-content:center;align-items:center;margin-bottom:12px">
      ${svg}
    </div>
    <p style="font-size:13px;line-height:1.5;color:var(--text);margin:0 0 14px;text-align:center">${tp().qrInstructions}</p>
    <div class="ui-row">
      <button class="secondary-btn" onclick="closeModal('uiModal')">${tp().okLabel}</button>
      <button class="primary-btn" onclick="copyShareUrl('${encodeURIComponent(url)}')">${tp().copyLink}</button>
    </div>
  `)
  document.querySelector("#uiModal .ui-box svg").style.maxWidth = "100%"
  document.querySelector("#uiModal .ui-box svg").style.height = "auto"
}

function copyShareUrl(encUrl){
  const url = decodeURIComponent(encUrl)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast(t.copied)).catch(()=>fallbackCopy(url))
  } else { fallbackCopy(url) }
}

function fallbackCopy(text){
  const ta = document.createElement("textarea")
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0"
  document.body.appendChild(ta); ta.focus(); ta.select()
  try { document.execCommand("copy"); showToast(t.copied) }
  catch(e){ showToast(t.copyError) }
  document.body.removeChild(ta)
}

// ── BACKUP ────────────────────────────────────────

function exportData(){
  const hasExtras = templates.length || Object.keys(priceHistory).length || Object.keys(barcodeMap).length
  const payload = hasExtras ? { lists, templates, priceHistory, barcodeMap } : lists
  const data = JSON.stringify(payload, null, 2)
  const blob = new Blob([data], { type:"application/json" })
  const url = URL.createObjectURL(blob)
  if(navigator.share){
    navigator.share({ files:[new File([blob], "mylists-backup.json", { type:"application/json" })], title:"MyOwnLists Backup" })
      .catch(() => downloadFile(url))
  } else {
    downloadFile(url)
  }
}

function downloadFile(url){
  const a = document.createElement("a")
  a.href = url; a.download = "mylists-backup.json"
  a.click(); URL.revokeObjectURL(url)
  showToast(t.backupExported)
}

function importData(e){
  const file = e.target.files[0]
  if(!file) return
  const reader = new FileReader()
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result)
      let arr = data
      let pendingTpl = null
      let pendingHist = null
      let pendingBc = null
      if(data && !Array.isArray(data) && Array.isArray(data.lists)){
        arr = data.lists
        if(Array.isArray(data.templates)) pendingTpl = data.templates
        if(data.priceHistory && typeof data.priceHistory === "object") pendingHist = data.priceHistory
        if(data.barcodeMap && typeof data.barcodeMap === "object") pendingBc = data.barcodeMap
      }
      if(!Array.isArray(arr)) throw new Error()
      if(!await uiConfirm(t.confirmImport(arr.length))) return
      if(pendingTpl){ templates = pendingTpl; localStorage.setItem("templates", JSON.stringify(templates)) }
      if(pendingHist){ priceHistory = pendingHist; savePriceHistory() }
      if(pendingBc){ barcodeMap = pendingBc; localStorage.setItem("barcodeMap", JSON.stringify(barcodeMap)) }
      lists = arr
      save(); renderLists()
      showToast(t.backupImported)
    } catch {
      showToast(t.invalidFile)
    }
  }
  reader.readAsText(file)
  e.target.value = ""
}

function computeFrequents(){
  const counts = new Map()
  lists.forEach(L => (L.items || []).forEach(it => {
    const n = (it.name || "").trim()
    if(!n) return
    const k = n.toLowerCase()
    const cur = counts.get(k)
    if(cur) cur.count++
    else counts.set(k, { display: n, count: 1 })
  }))
  return [...counts.values()].filter(x => x.count >= 2).sort((a,b) => b.count - a.count)
}

function renderFrequents(){
  const wrap = document.getElementById("frequentsWrap")
  const cloud = document.getElementById("frequentsCloud")
  const titleEl = document.getElementById("frequentsTitle")
  if(!wrap || currentList === null){ if(wrap) wrap.classList.add("hidden"); return }

  const inList = new Set((list.items || []).map(it => (it.name || "").trim().toLowerCase()))
  const top = computeFrequents().filter(x => !inList.has(x.display.toLowerCase())).slice(0, 8)
  if(!top.length){ wrap.classList.add("hidden"); return }
  titleEl.textContent = tp().frequentsTitle

  wrap.classList.remove("hidden")
}

function _hexToHSL(hex){
  const m = hex.replace("#","")
  const r = parseInt(m.slice(0,2),16)/255
  const g = parseInt(m.slice(2,4),16)/255
  const b = parseInt(m.slice(4,6),16)/255
  const max = Math.max(r,g,b), min = Math.min(r,g,b)
  let h=0, s=0, l=(max+min)/2
  if(max !== min){
    const d = max-min
    s = l>0.5 ? d/(2-max-min) : d/(max+min)
    switch(max){
      case r: h = (g-b)/d + (g<b ? 6 : 0); break
      case g: h = (b-r)/d + 2; break
      case b: h = (r-g)/d + 4; break
    }
    h *= 60
  }
  return [Math.round(h), Math.round(s*100), Math.round(l*100)]
}
