<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyOwnLists</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MyOwnLists">
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --bg:#f0f4f0;
  --card:#ffffff;
  --text:#1a2e1a;
  --muted:#7a957a;
  --primary:#3a9e4a;
  --primary-light:#e8f5e9;
  --btn:#e8ede8;
  --danger:#e53935;
  --warning:#f59e0b;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
.dark{
  --bg:#141f14;
  --card:#1e2e1e;
  --text:#e0ece0;
  --muted:#6a8f6a;
  --primary:#4caf50;
  --primary-light:#1a2e1a;
  --btn:#2a3d2a;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .3s,color .3s;
}
.container{ max-width:520px; margin:auto; padding:20px 16px 60px; }
.header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.header h2{ margin:0; font-size:26px; font-weight:800; color:var(--primary); }
.header-right{ display:flex; gap:6px; align-items:center; }
.lang-btn{
  display:flex; align-items:center; gap:6px;
  height:38px; padding:0 8px 0 6px; border-radius:10px; border:none;
  background:var(--btn); color:var(--text); cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:700;
  transition:transform .1s;
}
.lang-btn:active{ transform:scale(.95); }
.lang-flag-icon{
  width:22px; height:14px; border-radius:2px; flex-shrink:0;
  box-shadow:0 0 0 1px rgba(0,0,0,.06);
}
.lang-caret{ font-size:10px; opacity:.6; }

.lang-picker-list{ display:flex; flex-direction:column; gap:6px; }
.lang-picker-row{
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:10px; cursor:pointer;
  background:var(--btn); border:none; color:var(--text);
  font-family:inherit; font-size:14px; font-weight:600;
  text-align:left; transition:transform .1s, filter .15s;
}
.lang-picker-row:hover{ filter:brightness(.96); }
.lang-picker-row:active{ transform:scale(.98); }
.lang-picker-row.active{ background:var(--primary-light); color:var(--primary); }
.lang-picker-row .lang-flag-icon{ width:28px; height:18px; }
.lang-picker-row .pname{ flex:1; }
.lang-picker-row .pcode{ font-size:11px; opacity:.6; font-weight:700; letter-spacing:.05em; }
.theme-btn{
  width:38px; height:38px; border-radius:10px; border:none;
  background:var(--btn); cursor:pointer; font-size:18px;
  transition:transform .1s;
}
.theme-btn:active{ transform:scale(.9); }
.help-btn{
  font-weight:800; font-size:20px; line-height:1;
  color:#1e88e5;
}
.dark .help-btn{ color:#64b5f6; }
.help-btn:hover{ filter:brightness(1.1); }
#titleIcon{
  display:inline-block;
  animation:iconPop .25s ease;
}
@keyframes iconPop{
  0%{ opacity:0; transform:scale(.5) rotate(-15deg); }
  60%{ transform:scale(1.2) rotate(5deg); }
  100%{ opacity:1; transform:scale(1) rotate(0deg); }
}
.list-card{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); padding:14px; border-radius:var(--radius);
  margin-bottom:10px; box-shadow:var(--shadow); transition:transform .15s;
}
.list-card:active{ transform:scale(.98); }
.list-card-left{ display:flex; align-items:center; gap:10px; flex:1; cursor:pointer; }
.list-emoji{ font-size:26px; }
.list-info{ display:flex; flex-direction:column; }
.list-name{ font-weight:700; font-size:16px; }
.list-count{ font-size:12px; color:var(--muted); margin-top:2px; }
.actions{ display:flex; gap:6px; }
.icon-btn{
  width:34px; height:34px; border-radius:8px; background:var(--btn);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; border:none; transition:transform .1s;
}
.icon-btn:active{ transform:scale(.88); }
.section-title{
  font-size:12px; font-weight:800; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted); margin:22px 0 10px;
}
.form-row{ display:flex; gap:8px; margin-bottom:10px; }
.form-row input:first-child{ flex:1; }
.form-row input:last-child{ width:76px; }
input, textarea{
  width:100%; padding:11px 13px; border-radius:10px;
  border:2px solid transparent; background:var(--card); color:var(--text);
  font-family:inherit; font-size:15px; outline:none;
  transition:border-color .2s,box-shadow .2s; box-shadow:var(--shadow);
}
input:focus, textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(76,175,80,.15);
}
textarea{ resize:none; min-height:82px; }
.primary-btn{
  padding:12px; border:none; border-radius:10px; background:var(--primary);
  color:white; cursor:pointer; width:100%; font-family:inherit; font-size:15px;
  font-weight:700; box-shadow:0 3px 10px rgba(76,175,80,.35);
  transition:background .2s,transform .1s;
}
.primary-btn:active{ transform:scale(.98); box-shadow:none; }
.primary-btn:hover{ background:#388e3c; }
.top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; }
.back-btn{
  display:flex; align-items:center; gap:8px; height:38px; padding:0 14px 0 12px;
  border:none; border-radius:10px; background:var(--btn); color:var(--text);
  font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
  transition:transform .1s;
}
.back-btn::before{
  content:""; display:inline-block;
  width:8px; height:8px;
  border-left:2.5px solid currentColor;
  border-bottom:2.5px solid currentColor;
  transform:rotate(45deg) translate(1px,-1px);
  flex-shrink:0;
}
[dir=rtl] .back-btn::before{
  transform:rotate(-135deg) translate(-1px,1px);
}
.back-btn:active{ transform:scale(.96); }
.top-actions{ display:flex; gap:6px; }
.copy-btn, .clear-btn{
  width:38px; height:38px; padding:0;
  background:var(--btn); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; font-family:inherit;
  font-size:18px; color:var(--text); transition:transform .1s;
  line-height:1; flex-shrink:0;
}
.copy-btn:active, .clear-btn:active{ transform:scale(.94); }
#clearBtn{ color:var(--danger); }
.list-title-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.list-title-row h2{ margin:0; font-size:22px; font-weight:800; }
.progress-bar-wrap{
  background:var(--btn); border-radius:99px; height:7px; margin-bottom:18px; overflow:hidden;
}
.progress-bar{
  height:100%; background:var(--primary); border-radius:99px; transition:width .4s ease;
}
[dir=rtl] .progress-bar{ margin-left:auto; }
.category-section{ margin-bottom:14px; }
.category-header{
  display:flex; align-items:center; gap:6px; margin-bottom:6px; padding:4px 4px 4px 0;
  border-radius:8px; transition:background .15s;
}
.category-header:hover{ background:var(--primary-light); }
.cat-drag{ cursor:grab; opacity:.4; font-size:14px; flex-shrink:0; user-select:none; padding:0 2px; }
.category-label{
  font-size:11px; font-weight:800; text-transform:uppercase;
  letter-spacing:.1em; color:var(--muted); flex:1;
}
.use-cat-btn{
  width:24px; height:24px; border-radius:6px; background:var(--primary-light);
  font-size:16px; font-weight:800; color:var(--primary); flex-shrink:0;
}
.use-cat-btn:hover{ background:var(--primary); color:white; }
.collapse-btn{
  width:28px; height:28px; border-radius:7px; background:transparent;
  border:none; cursor:pointer; font-size:11px; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, background .15s;
}
.collapse-btn:hover{ background:var(--btn); }
.item{
  display:flex; align-items:center; gap:10px; background:var(--card);
  padding:10px 12px; border-radius:10px; margin-bottom:7px; box-shadow:var(--shadow);
}
.drag{ cursor:grab; opacity:.4; font-size:14px; flex-shrink:0; user-select:none; }
.toggle{
  width:22px; height:22px; border-radius:50%; border:2.5px solid #aaa;
  cursor:pointer; flex-shrink:0; transition:background .2s,border-color .2s,transform .15s;
  display:flex; align-items:center; justify-content:center; font-size:11px;
}
.toggle:active{ transform:scale(.85); }
.toggle.done{ background:var(--primary); border-color:var(--primary); }
.toggle.done::after{ content:'✓'; color:white; font-weight:800; }
.toggle.maybe{ background:var(--warning); border-color:var(--warning); }
.toggle.maybe::after{ content:'?'; color:white; font-weight:800; }
.item-name{ flex:1; font-size:15px; font-weight:600; transition:opacity .2s; }
.item-name.done{ text-decoration:line-through; opacity:.45; }
.item-name.maybe{ color:var(--warning); }
.hidden{ display:none; }
.toast{
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#1a2e1a; color:#e0ece0; padding:11px 22px;
  border-radius:99px; font-size:14px; font-weight:700;
  opacity:0; transition:opacity .25s,transform .25s;
  pointer-events:none; z-index:999; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast-undo{
  margin-left:14px; background:var(--primary); color:white;
  border:none; padding:5px 12px; border-radius:99px; cursor:pointer;
  font-family:inherit; font-weight:700; font-size:13px; pointer-events:auto;
}
.empty-state{ text-align:center; color:var(--muted); padding:28px 0 10px; font-size:15px; }
.search-row{ position:relative; margin-bottom:10px; }
.search-row input{ padding-left:36px; }
.search-row::before{
  content:"🔎"; position:absolute; left:11px; top:50%;
  transform:translateY(-50%); font-size:14px; opacity:.6; pointer-events:none;
}
[dir=rtl] .search-row input{ padding-left:13px; padding-right:36px; }
[dir=rtl] .search-row::before{ left:auto; right:11px; }
.no-match{ text-align:center; color:var(--muted); padding:14px 0; font-size:14px; }
.list-stats{ display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.stat-pill{
  background:var(--btn); padding:5px 11px; border-radius:99px;
  font-size:12px; font-weight:700; color:var(--text);
}
.stat-pill.primary{ background:var(--primary-light); color:var(--primary); }
.stat-pill.warn{ background:#fff3d6; color:#a76b00; }
.dark .stat-pill.warn{ background:#3a2e0a; color:#f5c452; }
.item-name{ cursor:pointer; user-select:none; }
.qty-badge, .unit-badge{
  display:inline-block; font-size:11px; font-weight:600;
  padding:2px 7px; border-radius:99px; margin-left:6px;
  vertical-align:middle; letter-spacing:0;
}
.qty-badge{ background:var(--primary-light); color:var(--primary); font-variant-numeric:tabular-nums; }
.unit-badge{ background:var(--primary-light); color:var(--primary); }
.price-badge{
  font-size:12px; font-weight:700; color:var(--muted);
  white-space:nowrap; margin:0 6px; flex-shrink:0;
}
.item-name.done .qty-badge,
.item-name.done + .price-badge{ opacity:.5; }
.stat-pill.money{ background:#e6f5e6; color:#1b6f1b; }
.dark .stat-pill.money{ background:#1a3a1a; color:#7fdc7f; }
.qty-hint{
  display:flex; align-items:center; gap:8px;
  background:#fff8e1; color:#7a5c00;
  padding:9px 14px; border-radius:10px; margin-bottom:12px;
  font-size:12px; font-weight:600; line-height:1.4;
}
.dark .qty-hint{ background:#2a2200; color:#ffd54f; }
.qty-hint .hint-text{ flex:1; }
.qty-hint button{
  background:transparent; border:none; cursor:pointer;
  font-size:14px; color:inherit; opacity:.7;
  padding:2px 6px; line-height:1; border-radius:6px;
}
.qty-hint button:hover{ opacity:1; }

.frequents-title{
  font-size:11px; font-weight:700; color:var(--muted);
  margin:0 0 8px; letter-spacing:.04em;
}
.frequents-cloud{
  display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;
}
.freq-chip{
  background:var(--primary-light); color:var(--primary);
  border:none; padding:6px 12px; border-radius:99px;
  font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; transition:transform .1s, filter .15s;
  display:inline-flex; align-items:center; gap:4px;
}
.freq-chip:hover{ filter:brightness(.96); }
.freq-chip:active{ transform:scale(.94); }
.freq-chip .freq-count{
  font-size:10px; opacity:.6; font-weight:700;
}

.add-row{ display:flex; gap:8px; align-items:stretch; }
.mic-btn{
  width:48px; flex-shrink:0; border:none; border-radius:10px;
  background:var(--btn); color:var(--text); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, background .2s, box-shadow .2s, color .2s;
}
.mic-btn .mic-icon{ display:block; }
.mic-btn:hover{ background:var(--primary-light); }
.mic-btn:active{ transform:scale(.94); }
.mic-btn.recording{
  background:var(--danger); color:white;
  animation:micPulse 1.1s ease-in-out infinite;
}
@keyframes micPulse{
  0%, 100%{ box-shadow:0 0 0 0 rgba(229,57,53,.55); }
  50%{ box-shadow:0 0 0 8px rgba(229,57,53,0); }
}

.field-label{
  display:block; font-size:10px; font-weight:800;
  text-transform:uppercase; letter-spacing:.08em;
  color:var(--primary); margin:0 0 4px 4px;
}
.field-group{ flex:1; }
.field-group .ui-input{ margin-bottom:0; }
.backup-row{ display:flex; gap:8px; margin-top:12px; }
.backup-btn{
  flex:1; padding:10px; border:none; border-radius:10px; background:var(--btn);
  color:var(--text); font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:transform .1s;
}
.backup-btn:active{ transform:scale(.97); }

/* ── HELP MODAL ── */
.help-modal{
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.55); z-index:1000;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.help-modal.hidden{ display:none; }
.help-box{
  background:var(--card); border-radius:var(--radius);
  padding:24px; max-width:480px; width:100%;
  max-height:82vh; overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.help-box-header{
  display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
}
.help-box-title{ font-size:18px; font-weight:800; color:var(--primary); }
.help-x-btn{
  width:32px; height:32px; border-radius:8px; border:none;
  background:var(--btn); color:var(--text); cursor:pointer;
  font-size:16px; font-weight:700; line-height:1;
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s;
}
.help-x-btn:active{ transform:scale(.88); }
.help-content h3{
  color:var(--primary); font-size:14px; font-weight:800;
  text-transform:uppercase; letter-spacing:.06em; margin:18px 0 8px;
}
.help-content p{ margin:0 0 8px; line-height:1.7; font-size:14px; }
.help-content ul{ padding-left:20px; margin:0 0 8px; line-height:1.9; font-size:14px; }
.help-content .warn-box{
  background:#fff8e1; border-left:4px solid var(--warning);
  border-radius:8px; padding:10px 14px; margin-top:4px; font-size:13px; line-height:1.6;
}
.dark .help-content .warn-box{ background:#2a2200; }
.help-close-btn{
  width:100%; margin-top:20px; padding:12px; border:none; border-radius:10px;
  background:var(--primary); color:white; font-family:inherit;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:background .2s,transform .1s;
}
.help-close-btn:hover{ background:#388e3c; }
.help-close-btn:active{ transform:scale(.98); }

/* ── PRO ── */
.settings-btn{ position:relative; }
.pro-badge{
  position:absolute; top:-4px; right:-4px;
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; font-size:9px; font-weight:800;
  padding:2px 5px; border-radius:99px;
  box-shadow:0 2px 6px rgba(255,140,0,.4);
  pointer-events:none;
}
.pro-tag{
  display:inline-block;
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; font-size:10px; font-weight:800;
  padding:2px 7px; border-radius:99px; margin-left:6px;
  vertical-align:middle; letter-spacing:.04em;
}
.locked-row{ position:relative; opacity:.55; }
.locked-row::after{
  content:"🔒"; position:absolute; right:10px; top:50%;
  transform:translateY(-50%); font-size:14px;
}
.unlock-cta{
  background:linear-gradient(135deg,#ffb300,#ff7a00);
  color:white; border:none; padding:14px 18px;
  border-radius:12px; font-family:inherit; font-weight:800;
  font-size:15px; cursor:pointer; width:100%;
  box-shadow:0 4px 14px rgba(255,140,0,.35);
  transition:transform .1s;
}
.unlock-cta:active{ transform:scale(.97); }
.pro-feature-list{ list-style:none; padding:0; margin:0 0 16px; }
.pro-feature-list li{
  padding:10px 12px; background:var(--btn);
  border-radius:10px; margin-bottom:7px;
  font-size:14px; font-weight:600;
  display:flex; align-items:center; gap:8px;
}
.pro-feature-list li.unlocked{ background:var(--primary-light); color:var(--primary); }
.settings-section{ margin:18px 0 10px; }
.settings-section h3{
  color:var(--primary); font-size:13px; font-weight:800;
  text-transform:uppercase; letter-spacing:.06em; margin:0 0 10px;
}
.color-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.color-swatch{
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:transform .1s;
}
.color-swatch:active{ transform:scale(.9); }
.color-swatch.active{ border-color:var(--text); }
.template-row{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); padding:10px 12px; border-radius:10px;
  margin-bottom:7px; box-shadow:var(--shadow);
}
.template-row .tname{ font-weight:700; font-size:14px; }
.template-row .titems{ font-size:12px; color:var(--muted); margin-top:2px; }
.template-actions{ display:flex; gap:5px; }
.stat-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0 14px;
}
.stat-card{
  background:var(--btn); padding:14px; border-radius:12px; text-align:center;
}
.stat-card .v{ font-size:24px; font-weight:800; color:var(--primary); }
.stat-card .k{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:4px; }
.top-items{ list-style:none; padding:0; margin:0; }
.top-items li{
  padding:8px 12px; background:var(--btn); border-radius:8px;
  margin-bottom:5px; font-size:13px; display:flex; justify-content:space-between;
}
.top-items .count{ color:var(--muted); font-weight:700; }
.license-input{
  width:100%; padding:12px; border-radius:10px;
  border:2px solid transparent; background:var(--card); color:var(--text);
  font-family:'Courier New',monospace; font-size:14px;
  letter-spacing:.05em; text-transform:uppercase; outline:none;
  transition:border-color .2s; box-shadow:var(--shadow);
}
.license-input:focus{ border-color:var(--primary); }
.secondary-btn{
  padding:11px; border:none; border-radius:10px; background:var(--btn);
  color:var(--text); cursor:pointer; width:100%;
  font-family:inherit; font-size:14px; font-weight:700;
  transition:transform .1s;
}
.secondary-btn:active{ transform:scale(.98); }
.danger-link{
  background:transparent; border:none; color:var(--danger);
  font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; padding:4px 0; margin-top:8px; text-decoration:underline;
}
.list-card.has-template{ border-left:3px solid var(--warning); }

/* ── PRO BACKGROUNDS ── */
.bg-dots{
  background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24'%3E%3Ccircle cx='12' cy='12' r='1.6' fill='%23808080' fill-opacity='0.18'/%3E%3C/svg%3E");
}
.bg-grid{
  background-image:
    linear-gradient(rgba(128,128,128,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(128,128,128,.12) 1px,transparent 1px);
  background-size:26px 26px;
}
.bg-paws{

    border-radius:3px !important;
  }
  .toggle.done{ background:black !important; }
  .toggle.done::after{ color:white !important; font-size:10px !important; }
  .toggle.maybe{ background:transparent !important; border-color:black !important; }
  .toggle.maybe::after{ color:black !important; }

function save(){ localStorage.setItem("lists", JSON.stringify(lists)) }

let _toastTimer = null
function setIconBtn(id, fullText){
  const el = document.getElementById(id)
  if(!el) return
  const m = String(fullText || "").match(/^(\S+)/)
  el.textContent = m ? m[1] : ""
  el.title = fullText || ""
  el.setAttribute("aria-label", fullText || "")
}

function showToast(msg, actionFn, actionLabel){
  const el = document.getElementById("toast")
  el.innerHTML = ""
  const span = document.createElement("span")
  span.textContent = msg
  el.appendChild(span)
  if(actionFn){
    const btn = document.createElement("button")
    btn.className = "toast-undo"
    btn.textContent = actionLabel || t.undo
    btn.onclick = () => {
      el.classList.remove("show")
      actionFn()
    }
    el.appendChild(btn)
  }
  el.classList.add("show")
  if(_toastTimer) clearTimeout(_toastTimer)
  _toastTimer = setTimeout(() => el.classList.remove("show"), actionFn ? (actionLabel ? 30000 : 4500) : 2200)
}

function setLang(lang){
  currentLang = lang
  t = T[lang]
  localStorage.setItem("lang", lang)
  applyLang()
}

const LANG_META = {
  pt: { code: "PT", name: "Português" },
  en: { code: "EN", name: "English" },
  es: { code: "ES", name: "Español" },
  ja: { code: "JA", name: "日本語" },
  he: { code: "HE", name: "עברית" },
  ko: { code: "KO", name: "한국어" },
}

function applyLang(){
  const isRTL = currentLang === "he"
  const langMap = { pt:"pt-BR", en:"en", es:"es", ja:"ja", he:"he", ko:"ko" }
  document.documentElement.lang = langMap[currentLang]
  document.documentElement.dir = isRTL ? "rtl" : "ltr"
  const meta = LANG_META[currentLang]
  document.getElementById("langFlagUse").setAttribute("href", "#flag-" + currentLang)
  document.getElementById("langCode").textContent = meta.code

  document.getElementById("sectionNewList").textContent = t.newList
  document.getElementById("listName").placeholder = t.listNamePlaceholder
  document.getElementById("listEmoji").placeholder = t.emojiPlaceholder
  document.getElementById("createListBtn").textContent = t.createList
  document.getElementById("exportBtn").textContent = t.exportBackup
  document.getElementById("importBtn").textContent = t.importBackup
  document.getElementById("backBtn").textContent = t.back
  setIconBtn("clearBtn", t.clearDone)
  setIconBtn("copyBtn", t.copy)
  document.getElementById("sectionAddItems").textContent = t.addItems
  document.getElementById("newCategory").placeholder = t.categoryPlaceholder
  document.getElementById("newItems").placeholder = t.itemsPlaceholder
  document.getElementById("addItemsBtn").textContent = t.addBtn
  const vb = document.getElementById("voiceBtn")
  if(vb) vb.title = tp().voiceTooltip
  const si = document.getElementById("searchInput")
  if(si) si.placeholder = t.searchPlaceholder
  if(typeof refreshProUI === "function") refreshProUI()

  if(!document.getElementById("itemsPage").classList.contains("hidden")){
    renderItems()
  } else {
    renderLists()

}

// ── LISTS ─────────────────────────────────────────

function createList(){
  const name = document.getElementById("listName").value.trim()
  const emoji = document.getElementById("listEmoji").value.trim() || "🛒"
  if(!name) return
  lists.push({ name, emoji, items:[], categoryOrder:[], collapsedCats:[] })
  document.getElementById("listName").value = ""
  document.getElementById("listEmoji").value = ""
  save(); renderLists()
  showToast(t.listCreated)
}

function renderLists(){
  const container = document.getElementById("lists")
  container.innerHTML = ""
  if(!lists.length){
    container.innerHTML = `<div class="empty-state">${t.emptyLists}</div>`
    return
  }
  lists.forEach((list, i) => {
    const total = list.items.length
    const done = list.items.filter(it => it.status === 1).length
    const countText = total ? t.itemsBought(done, total) : t.emptyList
    const div = document.createElement("div")
    div.className = "list-card"
    div.innerHTML = `
      <div class="list-card-left" onclick="openList(${i})">
        <span class="list-emoji">${list.emoji}</span>
        <div class="list-info">
          <span class="list-name">${list.name}</span>
          <span class="list-count">${countText}</span>
        </div>
      </div>
      <div class="actions">
        <button class="icon-btn" onclick="renameList(${i})">✏️</button>
        <button class="icon-btn" onclick="deleteList(${i})">❌</button>
      </div>
    `
    container.appendChild(div)
  })
}

async function renameList(i){
  const name = await uiPrompt(t.renamePrompt, lists[i].name)
  if(name === null) return
  const trimmed = name.trim()
  if(trimmed) lists[i].name = trimmed
  const emoji = await uiPrompt(t.emojiPrompt, lists[i].emoji)
  if(emoji === null){ save(); renderLists(); return }
  const eTrim = emoji.trim()
  if(eTrim) lists[i].emoji = eTrim
  save(); renderLists()
}

async function deleteList(i){
  if(!await uiConfirm(t.deleteConfirm(lists[i].name))) return
  const removed = lists[i]
  lists.splice(i, 1)
  save(); renderLists()
  showToast(t.listDeleted, () => {
    lists.splice(i, 0, removed)
    save(); renderLists()
    showToast(t.restored)
  })
}

function openList(i){
  currentList = i
  document.getElementById("listsPage").classList.add("hidden")
  document.getElementById("itemsPage").classList.remove("hidden")
  document.getElementById("listTitle").textContent = lists[i].emoji + " " + lists[i].name
  const si = document.getElementById("searchInput")
  if(si) si.value = ""
  renderItems()
}

function back(){
  document.getElementById("itemsPage").classList.add("hidden")
  document.getElementById("listsPage").classList.remove("hidden")
  renderLists()
}

// ── ITEMS ─────────────────────────────────────────

function addItems(){
  const txt = document.getElementById("newItems").value.trim()
  const category = document.getElementById("newCategory").value.trim()
  if(!txt) return
  const list = lists[currentList]
  if(!list.categoryOrder) list.categoryOrder = []
  if(!list.collapsedCats) list.collapsedCats = []
  txt.split("\n").forEach(t2 => {
    if(t2.trim()) list.items.push({ name:t2.trim(), status:0, category:category||"" })
  })
  if(!list.categoryOrder.includes(category||"")) list.categoryOrder.push(category||"")
  document.getElementById("newItems").value = ""
  save(); renderItems()
  showToast(t.itemsAdded)
}

function toggleStatus(i){
  lists[currentList].items[i].status = (lists[currentList].items[i].status + 1) % 3
  save(); renderItems()
}

  const item = lists[currentList].items[i]

  if(!result || !result.name) return
  item.name = result.name
  item.qty = result.qty || ""
  item.unit = result.unit || ""
  item.price = result.price || ""
  save(); renderItems()

// ── RENDER ITEMS ──────────────────────────────────

function renderItems(){
  const container = document.getElementById("items")
  container.innerHTML = ""
  const list = lists[currentList]
  if(!list.categoryOrder) list.categoryOrder = []
  if(!list.collapsedCats) list.collapsedCats = []

  const total = list.items.length
  const done = list.items.filter(it => it.status === 1).length
  const maybeC = list.items.filter(it => it.status === 2).length
  const pending = total - done - maybeC
  const pct = total ? Math.round((done/total)*100) : 0
  document.getElementById("progressBar").style.width = pct + "%"

  const stats = document.getElementById("listStats")
  if(stats){
    stats.innerHTML = ""
    if(total){
      if(pending > 0) stats.innerHTML += `<span class="stat-pill primary">⏳ ${t.remaining(pending)}</span>`
      if(done > 0) stats.innerHTML += `<span class="stat-pill">✅ ${t.done(done)}</span>`
      if(maybeC > 0) stats.innerHTML += `<span class="stat-pill warn">🤔 ${t.maybe(maybeC)}</span>`
      if(total && pending === 0 && maybeC === 0) stats.innerHTML = `<span class="stat-pill primary">${t.allDone}</span>`
      const totalPrice = list.items.reduce((s, it) => { const p = parsePrice(it.price); return s + (isFinite(p) ? p : 0) }, 0)
      if(totalPrice > 0) stats.innerHTML += `<span class="stat-pill money">💰 ${tp().listTotal(formatPrice(totalPrice))}</span>`
    }
  }

  const itemDL = document.getElementById("itemNameOptions")
  if(itemDL){
    itemDL.innerHTML = ""
    const all = new Set()
    lists.forEach(L => L.items.forEach(it => { if(it.name) all.add(it.name) }))
    Array.from(all).sort().forEach(n => { const o = document.createElement("option"); o.value = n; itemDL.appendChild(o) })
  }

  if(!total){
    container.innerHTML = `<div class="empty-state">${t.emptyItems}</div>`
    renderFrequents()
    return
  }

  const hasMeta = list.items.some(it => it.qty || it.unit || it.price)
  const hintDismissed = localStorage.getItem("hint_qty_dismissed") === "1"
  if(!hasMeta && !hintDismissed){
    const hint = document.createElement("div")
    hint.className = "qty-hint"
    hint.innerHTML = `<span class="hint-text">${tp().qtyHint}</span><button onclick="dismissQtyHint()" aria-label="dismiss">✕</button>`
    container.appendChild(hint)
  }

  const dl = document.getElementById("categoryOptions")
  if(dl){
    dl.innerHTML = ""
    const cats = [...new Set(list.items.map(it => it.category).filter(Boolean))]
    cats.forEach(c => { const o = document.createElement("option"); o.value = c; dl.appendChild(o) })
  }

  const q = (document.getElementById("searchInput")?.value || "").trim().toLowerCase()

  const groups = {}
  let visibleCount = 0
  list.items.forEach((item, i) => {
    if(q && !item.name.toLowerCase().includes(q)) return
    const cat = item.category || ""
    if(!groups[cat]) groups[cat] = []
    groups[cat].push({ item, i })
    visibleCount++
  })
  if(q && !visibleCount){
    container.innerHTML = `<div class="no-match">${t.noMatch}</div>`
    return
  }

  const existingCats = Object.keys(groups)
  const orderedCats = list.categoryOrder.filter(c => existingCats.includes(c))
  existingCats.forEach(c => { if(!orderedCats.includes(c)) orderedCats.push(c) })
  list.categoryOrder = orderedCats

  const catContainer = document.createElement("div")
  catContainer.id = "catContainer"
  container.appendChild(catContainer)

  orderedCats.forEach(cat => {
    const isCollapsed = list.collapsedCats.includes(cat)
    const section = document.createElement("div")
    section.className = "category-section"
    section.dataset.cat = cat

    if(cat){
      const header = document.createElement("div")
      header.className = "category-header"
      const catEsc = cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")
      const catEmoji = (list.categoryEmojis && list.categoryEmojis[cat]) || "🏷️"
      header.innerHTML = `
        <div class="cat-drag">⠿</div>
        <div class="category-label">${catEmoji} ${cat}</div>
        <button class="cat-rename-btn" title="✏️" onclick="renameCategory('${catEsc}')">✏️</button>
        <button class="icon-btn use-cat-btn" title="+" onclick="useCategory('${catEsc}')">+</button>
        <button class="collapse-btn" onclick="toggleCollapse('${catEsc}')">
          ${isCollapsed ? '▶' : '▼'}
        </button>
      `
      section.appendChild(header)
    }

    const wrap = document.createElement("div")
    wrap.dataset.cat = cat
    if(isCollapsed) wrap.classList.add("hidden")

    groups[cat].forEach(({ item, i }) => {
      const row = document.createElement("div")
      row.className = "item"
      row.dataset.index = i
      const tc = item.status===1?"done":item.status===2?"maybe":""
      const qtyHTML =
        (item.qty ? `<span class="qty-badge">×${_esc(item.qty)}</span>` : "") +
        (item.unit ? `<span class="unit-badge">${_esc(item.unit)}</span>` : "")
      const priceText = formatPrice(item.price)
      const priceHTML = priceText ? `<span class="price-badge">${priceText}</span>` : ""
      row.innerHTML = `
        <div class="drag">⠿</div>
        <div class="toggle ${tc}" onclick="toggleStatus(${i})"></div>
        <div class="item-name ${tc}" onclick="toggleStatus(${i})">${item.name}${qtyHTML}</div>
        ${priceHTML}
        <button class="icon-btn" onclick="editItem(${i})">✏️</button>
        <button class="icon-btn" onclick="deleteItem(${i})">❌</button>
      `
      wrap.appendChild(row)
    })

    section.appendChild(wrap)
    catContainer.appendChild(section)

    new Sortable(wrap, {
      handle:".drag", animation:150,
      onEnd:() => {
        const allItems = []
        document.querySelectorAll("[data-cat] .item").forEach(row => {
          allItems.push(lists[currentList].items[parseInt(row.dataset.index)])
        })
        lists[currentList].items = allItems
        save(); renderItems()
      }
    })
  })

  new Sortable(catContainer, {
    handle:".cat-drag", animation:150,
    onEnd:() => {
      const newOrder = []
      catContainer.querySelectorAll(".category-section").forEach(sec => {
        newOrder.push(sec.dataset.cat)
      })
      lists[currentList].categoryOrder = newOrder
      save(); renderItems()
    }
  })

  renderFrequents()
}

// ── COPY LIST ─────────────────────────────────────

function buildListText(list, withStatus, resetStatus, includeTotal){
  const statusLabel = ["⚪","✅","🤔"]
  const groups = {}
  list.items.forEach(item => {
    const cat = item.category || ""
    if(!groups[cat]) groups[cat] = []
    groups[cat].push(item)
  })
  const orderedCats = (list.categoryOrder || []).filter(c => groups[c])
  Object.keys(groups).forEach(c => { if(!orderedCats.includes(c)) orderedCats.push(c) })
  const lines = [list.emoji + " " + list.name, ""]
  orderedCats.forEach(cat => {
    if(cat){
      const ce = (list.categoryEmojis && list.categoryEmojis[cat]) || ""
      lines.push("▸ " + (ce ? ce + " " : "") + cat)
    }
    groups[cat].forEach(item => {
      const eff = resetStatus ? 0 : item.status
      const prefix = withStatus ? statusLabel[eff] : "•"
      const qty = item.qty ? `${item.qty}${item.unit ? " " + item.unit : ""} ` : ""
      const price = formatPrice(item.price)
      const priceTail = price ? `  (${price})` : ""
      lines.push(`${prefix} ${qty}${item.name}${priceTail}`)
    })
    if(cat) lines.push("")
  })
  if(includeTotal){
    const totalPrice = list.items.reduce((s, it) => { const p = parsePrice(it.price); return s + (isFinite(p) ? p : 0) }, 0)
    if(totalPrice > 0){
      lines.push("")
      lines.push(tp().listTotal(formatPrice(totalPrice)))
    }
  }
  return lines.join("\n")
}

async function copyList(){
  const list = lists[currentList]
  if(!list || !list.items.length){ showToast(t.listEmpty); return }
  const opts = [
    { label: tp().copyOnlyItems, desc: tp().copyOnlyItemsDesc },
    { label: tp().copyWithStatus, desc: tp().copyWithStatusDesc },
    { label: tp().copyShare, desc: tp().copyShareDesc },
    { label: tp().printOption, desc: tp().printOptionDesc },
    { label: tp().qrOption + (pro ? "" : " 🔒"), desc: tp().qrOptionDesc },
  ]
  const choice = await uiChoice(tp().copyTitle, opts)
  if(choice === null) return
  if(choice === 3){ window.print(); return }
  if(choice === 4){ generateQR(); return }
  const withStatus = choice === 1 || choice === 2
  const resetStatus = choice === 2
  const text = buildListText(list, withStatus, resetStatus, true)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(t.copied)).catch(()=>fallbackCopy(text))
  } else { fallbackCopy(text) }
}

function loadQRLib(){
  if(window.qrcode) return Promise.resolve()
  return new Promise((resolve, reject) => {
    const s = document.createElement("script")
    s.src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"
    s.onload = resolve
    s.onerror = reject
    document.head.appendChild(s)
  })
}

async function generateQR(){
  const list = lists[currentList]
  if(!list || !list.items.length){ showToast(t.listEmpty); return }
  if(!pro){ openUnlock(); return }
  try {
    await loadQRLib()
  } catch(e){
    showToast(tp().qrLibError)
    return
  }
  const text = buildListText(list, true, true, false)
  const baseUrl = "https://myownlists.app/?import="
  const url = baseUrl + encodeURIComponent(text)
  let qr
  try {
    qr = qrcode(0, "L")
    qr.addData(url)
    qr.make()
  } catch(e){
    showToast(tp().qrTooLarge)
    return
  }
  const svg = qr.createSvgTag({ cellSize: 6, margin: 4, scalable: true })
  _uiResolve = null
  _uiOpen(tp().qrTitle, `
    <div style="background:white;border-radius:12px;padding:16px;display:flex;justify-content:center;align-items:center;margin-bottom:12px">
      ${svg}
    </div>
    <p style="font-size:13px;line-height:1.5;color:var(--text);margin:0 0 14px;text-align:center">${tp().qrInstructions}</p>
    <div class="ui-row">
      <button class="secondary-btn" onclick="closeModal('uiModal')">${tp().okLabel}</button>
      <button class="primary-btn" onclick="copyShareUrl('${encodeURIComponent(url)}')">${tp().copyLink}</button>
    </div>
  `)
  document.querySelector("#uiModal .ui-box svg").style.maxWidth = "100%"
  document.querySelector("#uiModal .ui-box svg").style.height = "auto"
}

function copyShareUrl(encUrl){
  const url = decodeURIComponent(encUrl)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast(t.copied)).catch(()=>fallbackCopy(url))
  } else { fallbackCopy(url) }
}

function fallbackCopy(text){
  const ta = document.createElement("textarea")
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0"
  document.body.appendChild(ta); ta.focus(); ta.select()
  try { document.execCommand("copy"); showToast(t.copied) }
  catch(e){ showToast(t.copyError) }
  document.body.removeChild(ta)
}

function exportData(){
  const payload = templates.length ? { lists, templates } : lists
  const data = JSON.stringify(payload, null, 2)
  const blob = new Blob([data], { type:"application/json" })
  const url = URL.createObjectURL(blob)
  if(navigator.share){
    navigator.share({ files:[new File([blob], "mylists-backup.json", { type:"application/json" })], title:"MyOwnLists Backup" })
      .catch(() => downloadFile(url))
  } else {
    downloadFile(url)
  }
}

function downloadFile(url){
  const a = document.createElement("a")
  a.href = url; a.download = "mylists-backup.json"
  a.click(); URL.revokeObjectURL(url)
  showToast(t.backupExported)
}

function importData(e){
  const file = e.target.files[0]
  if(!file) return
  const reader = new FileReader()
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result)
      let arr = data
      let pendingTpl = null
      if(data && !Array.isArray(data) && Array.isArray(data.lists)){
        arr = data.lists
        if(Array.isArray(data.templates)) pendingTpl = data.templates
      }
      if(!Array.isArray(arr)) throw new Error()
      if(!await uiConfirm(t.confirmImport(arr.length))) return
      if(pendingTpl){ templates = pendingTpl; localStorage.setItem("templates", JSON.stringify(templates)) }
      lists = arr
      save(); renderLists()
      showToast(t.backupImported)
    } catch {
      showToast(t.invalidFile)
    }
  }
  reader.readAsText(file)
  e.target.value = ""
}

function parsePrice(v){

  const n = parseFloat(String(v).replace(",", "."))

function formatPrice(v){
  const n = parsePrice(v)
  if(!isFinite(n)) return ""
  const sym = tp().currencySymbol
  const useComma = currentLang === "pt" || currentLang === "es" || currentLang === "he"
  return sym + " " + n.toFixed(2).replace(".", useComma ? "," : ".")
}

function dismissQtyHint(){

function computeFrequents(){
  const counts = new Map()
  lists.forEach(L => (L.items || []).forEach(it => {
    const n = (it.name || "").trim()
    if(!n) return
    const k = n.toLowerCase()
    const cur = counts.get(k)
    if(cur) cur.count++
    else counts.set(k, { display: n, count: 1 })
  }))
  return [...counts.values()].filter(x => x.count >= 2).sort((a,b) => b.count - a.count)
}

function renderFrequents(){
  const wrap = document.getElementById("frequentsWrap")
  const cloud = document.getElementById("frequentsCloud")
  const titleEl = document.getElementById("frequentsTitle")
  if(!wrap || currentList === null){ if(wrap) wrap.classList.add("hidden"); return }
  const list = lists[currentList]
  if(!list){ wrap.classList.add("hidden"); return }
  const inList = new Set((list.items || []).map(it => (it.name || "").trim().toLowerCase()))
  const top = computeFrequents().filter(x => !inList.has(x.display.toLowerCase())).slice(0, 8)
  if(!top.length){ wrap.classList.add("hidden"); return }
  titleEl.textContent = tp().frequentsTitle
  cloud.innerHTML = ""
  top.forEach(x => {
    const btn = document.createElement("button")
    btn.className = "freq-chip"
    btn.innerHTML = `+ ${_esc(x.display)} <span class="freq-count">${x.count}</span>`
    btn.onclick = () => addFromFreq(x.display)
    cloud.appendChild(btn)
  })
  wrap.classList.remove("hidden")
}

async function renameCategory(oldCat){
  const list = lists[currentList]
  if(!list.categoryEmojis) list.categoryEmojis = {}
  const oldEmoji = list.categoryEmojis[oldCat] || ""
  const result = await uiPromptWithEmoji(tp().renameCatPrompt, oldCat, oldEmoji)
  if(result === null) return
  const newCat = (result.name || "").trim() || oldCat
  const newEmoji = (result.emoji || "").trim()
  if(newCat !== oldCat){
    list.items.forEach(it => { if((it.category || "") === oldCat) it.category = newCat })
    list.categoryOrder = (list.categoryOrder || []).map(c => c === oldCat ? newCat : c)
    if(list.collapsedCats) list.collapsedCats = list.collapsedCats.map(c => c === oldCat ? newCat : c)
    delete list.categoryEmojis[oldCat]
  }
  if(newEmoji) list.categoryEmojis[newCat] = newEmoji
  else delete list.categoryEmojis[newCat]
  save(); renderItems()
}

// ── PASTE-TO-LIST IMPORT ──────────────────────────
function parseTextToList(text){
  if(!text) return { items:[], categoryOrder:[], suggestedName:"", suggestedEmoji:"", categoryEmojis:{} }
  const lines = text.split(/\r?\n/)
  const nonEmptyCount = lines.filter(l => l.trim().length).length
  const items = []
  const categoryOrder = []
  const categoryEmojis = {}
  let currentCat = ""
  let suggestedName = ""
  let suggestedEmoji = ""
  let firstSeen = false
  const STATUS_RE = /^(?:✅|☑️|✓|🤔|⚪|⬜|☐|✗|\[[xv ]\])\s+/iu
  const BULLET_RE = /^(?:[•\-\*▸◦▪]|\d+[.)])\s+/
  const EMOJI_TITLE_RE = /^([\p{Extended_Pictographic}\u{200D}️]+)\s+(.+)$/u
  for(const raw of lines){
    let line = raw.trim()
    if(!line) continue
    const headerMatch = line.match(/^(?:#{1,3}|▸|📂)\s+(.+?):?\s*$/u)
    if(headerMatch){
      const title = headerMatch[1].trim()
      if(!firstSeen && !suggestedName){
        const em = title.match(EMOJI_TITLE_RE)
        if(em){ suggestedEmoji = em[1].slice(0,4); suggestedName = em[2].trim() }
        else suggestedName = title
        firstSeen = true
      } else if(title){
        const em = title.match(EMOJI_TITLE_RE)
        if(em){
          currentCat = em[2].trim()
          categoryEmojis[currentCat] = em[1].slice(0,4)
        } else {
          currentCat = title
        }
        if(!categoryOrder.includes(currentCat)) categoryOrder.push(currentCat)
      }
      continue
    }
    if(!firstSeen && !suggestedName && nonEmptyCount > 1 && line.length <= 60){
      const isStatus = STATUS_RE.test(line)
      const isBullet = BULLET_RE.test(line)
      const startsWithEmoji = /^[\p{Extended_Pictographic}]/u.test(line)
      if(startsWithEmoji && !isStatus && !isBullet){
        const em = line.match(EMOJI_TITLE_RE)
        if(em){
          suggestedEmoji = em[1].slice(0,4)
          suggestedName = em[2].trim()
        } else {
          suggestedName = line
        }
        firstSeen = true
        continue
      }
    }
    let status = 0
    const statusMatch = line.match(/^(✅|☑️|✓|🤔|⚪|⬜|☐|✗|\[[xv ]\])\s*(.+)$/iu)
    if(statusMatch){
      const m = statusMatch[1]
      if(/✅|☑️|✓|\[x\]|\[v\]/i.test(m)) status = 1
      else if(/🤔/.test(m)) status = 2
      line = statusMatch[2].trim()
    }
    line = line.replace(/^[•\-\*▸◦▪]\s+/, "").replace(/^\d+[.)]\s+/, "")
    if(!line) continue
    let price = ""
    const priceMatch = line.match(/\s*\(([^()]+)\)\s*$/)
    if(priceMatch){
      const numMatch = priceMatch[1].match(/(\d+(?:[.,]\d+)?)/)
      if(numMatch){
        price = numMatch[1]
        line = line.slice(0, line.length - priceMatch[0].length).trim()
      }
    }
    if(!line) continue
    let qty = "", unit = ""
    const qm = line.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-ZáéíóúçÁÉÍÓÚÇ]{1,5})?\s+(.+)$/)
    if(qm && qm[3].length > 0){
      qty = qm[1]
      unit = qm[2] || ""
      line = qm[3]
    }
    if(!line) continue
    firstSeen = true
    if(currentCat && !categoryOrder.includes(currentCat)) categoryOrder.push(currentCat)
    items.push({ name: line, status, category: currentCat, qty, unit, price })
  }
  return { items, categoryOrder, suggestedName, suggestedEmoji, categoryEmojis }
}

// ── VOICE INPUT ──────────────────────────────────
const SR_API = window.SpeechRecognition || window.webkitSpeechRecognition
let _voice = null
let _voiceBuffer = ""
let _voiceTriedFallback = false
const VOICE_LANG_MAP = { pt:"pt-BR", en:"en-US", es:"es-ES", ja:"ja-JP", he:"he-IL", ko:"ko-KR" }
const VOICE_SPLIT_RE = /[,;]|\b(?: e | y | and | und | et )\b/i

function toggleVoice(){
  if(!VOICE_AVAILABLE){ showToast(tp().voiceUnsupported); return }
  if(_voice){ stopVoice(); return }
  _voiceTriedFallback = false
  startVoiceLang(VOICE_LANG_MAP[currentLang] || "en-US")
}

function startVoiceLang(lang){
  try {
    _voice = new SR_API()
    _voice.lang = lang
    _voice.continuous = true
    _voice.interimResults = false
    _voiceBuffer = ""
    _voice.onresult = e => {
      for(let i = e.resultIndex; i < e.results.length; i++){
        if(e.results[i].isFinal) _voiceBuffer += " " + e.results[i][0].transcript
      }
    }
    _voice.onend = () => finishVoice()
    _voice.onerror = ev => {
      if(ev.error === "aborted" || ev.error === "no-speech"){
        finishVoice(); return
      }
      // network error: try once with en-US fallback
      if(ev.error === "network" && !_voiceTriedFallback && lang !== "en-US"){
        _voiceTriedFallback = true
        try { _voice.abort() } catch(e){}
        _voice = null
        document.getElementById("voiceBtn").classList.remove("recording")
        setTimeout(() => startVoiceLang("en-US"), 200)
        return
      }
      const tt = tp()
      let msg = tt.voiceError
      if(ev.error === "network") msg = (tt.voiceNetworkError || tt.voiceError) + " — " + (tt.voiceNeedsInternet || "needs internet")
      else if(ev.error === "not-allowed" || ev.error === "service-not-allowed") msg = tt.voicePermissionDenied || tt.voiceError
      else msg = tt.voiceError + " (" + ev.error + ")"
      showToast(msg)
      finishVoice()
    }
    _voice.start()
    document.getElementById("voiceBtn").classList.add("recording")
    if(!_voiceTriedFallback) showToast(tp().voiceListening)
  } catch(e){
    showToast(tp().voiceError)
    _voice = null
  }
}
function stopVoice(){
  if(_voice){ try { _voice.stop() } catch(e){} }
}
function finishVoice(){
  document.getElementById("voiceBtn").classList.remove("recording")
  _voice = null
  const text = (_voiceBuffer || "").trim()
  _voiceBuffer = ""
  if(!text) return
  const items = text.split(VOICE_SPLIT_RE).map(s => s.trim()).filter(Boolean)
  if(!items.length) return
  const ta = document.getElementById("newItems")
  const existing = ta.value.replace(/\s+$/, "")
  ta.value = (existing ? existing + "\n" : "") + items.map(s => s.charAt(0).toUpperCase() + s.slice(1)).join("\n")
  ta.focus()
}
const IS_MOBILE = /Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent || "")
const VOICE_AVAILABLE = !!SR_API && (location.protocol !== "file:") && IS_MOBILE

function checkShareTarget(){
  try {
    const params = new URLSearchParams(window.location.search)
    const importText = params.get("import") || ""
    const text = params.get("share_text") || params.get("text") || ""
    const title = params.get("share_title") || params.get("title") || ""
    const url = params.get("share_url") || params.get("url") || ""
    if(!importText && !text && !title && !url) return
    const combined = importText || [title, text, url].filter(Boolean).join("\n")
    history.replaceState(null, "", window.location.pathname)
    setTimeout(() => openPasteImport(combined), 200)
  } catch(e){ console.warn("share target:", e) }
}

        })
      })
    })
    .catch(e => console.warn("SW error:", e))
}
</script>
